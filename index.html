var NUDGES={faith:["It has been a few days since faith showed up. Even one quiet moment with Heavenly Father is enough.","Marmee began each morning in quiet prayer. Your spiritual life is worth tending today, even briefly."],movement:["Jo March would not have stayed inside on a day like this. The lane is waiting.","The Norwegians say there is no bad weather, only bad clothing. Get outside today."],nourishment:["The March table was always full of simple, real food. Try to get a fruit or vegetable in today.","In Blue Zones, the plate is mostly plants and the meal is unhurried. Even one good choice counts."],water:["A glass of water first thing sets the tone for the whole day. Start there.","The Edwardians drank water and weak tea steadily all day. Small sips, often."],connection:["It has been a little while since a truly meaningful conversation. A short message to someone who matters is enough.","In Sardinia, no one eats alone if they can help it. Who have you been meaning to call?"],service:["It has been a few days since service showed up. Even one small act of kindness is enough.","The March girls turned to service whenever life felt heavy. Who could use a little of your attention today?"],stewardship:["It has been a few days since stewardship showed up. Even one small act of tending is enough.","What is in your care that needs you today? Even one errand crossed off is a form of faithfulness."],creative:["Your creative self has been quiet lately. Even ten minutes of something that fills you is enough.","Jo wrote even on the hard days. Make something small, even if it feels unimportant."],joy:["Small joys and cozy moments have been scarce lately. Light something, make something warm, or simply notice one thing beautiful today.","Coziness is not an accident. It is something you build. What could you create today?"],rest:["A proper wind-down has been missing lately. Give your evening a little more gentleness tonight.","Blue Zones elders sleep when it is dark. Your body is probably asking for the same."]};

var ENCOURAGEMENT={faith:["Your faith has been a thread in your days lately. Marmee wove hers through everything she did.","Connecting with Heavenly Father has been part of your rhythm. In Blue Zones, faith is one of the longest threads."],movement:["Getting outside and moving has been part of your week. The Edwardians and Scandinavians both knew this was non-negotiable.","Outdoor movement has become part of your rhythm. In Okinawa and Scandinavia alike, that is simply called living."],nourishment:["You have been tending to your meals with care. Marmee would call that good housekeeping of the soul.","Something is shifting in how you are feeding yourself. Blue Zones elders would recognize that shift."],water:["You have been drinking your water consistently. Simple, steady, good.","Water has been showing up in your days. In Okinawa, that is one of the first secrets they name."],connection:["You have been showing up for the people in your life in meaningful ways. The March family made that their whole practice.","You have not been doing this alone. In Sardinia, that is considered the whole point."],service:["Service has been showing up in your days. Marmee always said the surest way out of your own troubles is to tend to someone else.","Acts of service have been a thread in your week. In Blue Zones, contributing to the community is one of the longest threads of all."],stewardship:["Stewardship has been showing up in your days. Faithful tending of small things is the foundation of a well-ordered life.","The things in your care have been getting your attention this week. That quiet faithfulness matters more than it looks."],creative:["Your creative hobbies have been showing up. Jo never let a week pass without making something just for herself.","Something creative has found its place in your week. In Blue Zones, play and making are not so different."],joy:["Warmth and delight have been finding their way into your days. That is hygge and ikigai working together.","Joy and coziness have shown up in your days. That is one of the oldest wellness secrets there is."],rest:["Rest has been part of your week. Beth always knew the value of a quiet evening.","Rest is showing up in your rhythm. Blue Zones elders have always known it is not a luxury."]};

var QUOTES=[{text:"The secret of health for both mind and body is not to mourn for the past, nor to worry about the future, but to live the present moment wisely.",source:"Buddhist proverb, Okinawa"},{text:"I am not afraid of storms, for I am learning how to sail my ship.",source:"Louisa May Alcott, Little Women"},{text:"It is not how much we have, but how much we enjoy, that makes happiness.",source:"Blue Zones wisdom"},{text:"She had a gift for making the most of small pleasures.",source:"Louisa May Alcott, Little Women"},{text:"Eat until you are eight parts full, and let the other two parts nourish your soul.",source:"Hara hachi bu, Okinawa"},{text:"There is no bad weather, only bad clothing.",source:"Norwegian proverb"},{text:"Belonging to a community is one of the most powerful medicines we have.",source:"Blue Zones research"},{text:"Hygge is not about things. It is about togetherness, presence, and the pleasure of simple moments.",source:"Danish proverb"},{text:"Walking is a man's best medicine.",source:"Hippocrates"},{text:"The people who live the longest do not try to live longer. They live fully.",source:"Blue Zones research"},{text:"An early morning walk is a blessing for the whole day.",source:"Henry David Thoreau, c. 1850"},{text:"Let food be thy medicine and medicine be thy food.",source:"Hippocrates"},{text:"She resolved to be the maker of her own happiness.",source:"Louisa May Alcott, Little Women"},{text:"The greatest wealth is health.",source:"Virgil"},{text:"Sleep is the golden chain that ties health and our bodies together.",source:"Thomas Dekker, c. 1609"},{text:"One cannot think well, love well, sleep well, if one has not dined well.",source:"Virginia Woolf, c. 1929"},{text:"Real kindness is doing a little thing well, and doing it every day.",source:"Marmee, Little Women"},{text:"Have regular hours for work and play. Make each day both useful and pleasant.",source:"Marmee, Little Women"},{text:"Lagom is not settling for less. It is knowing that enough is exactly right.",source:"Swedish proverb"},{text:"The body needs movement the way the mind needs stillness.",source:"Scandinavian folk wisdom"}];

var SEASONAL=[{season:"Winter",text:"January is for hygge. The Danes and Norwegians do not hibernate in winter. They light candles, gather close, and make the indoors feel like a gift."},{season:"Winter",text:"February is for connection. The March girls wrote letters and paid visits. Who have you been meaning to reach out to?"},{season:"Spring",text:"March is for opening windows and going outside. Jo March flung hers open every spring morning. Step out and feel the season turning."},{season:"Spring",text:"April is for movement. The Edwardians cycled and walked the moment the weather turned. Find your version and get outside."},{season:"Spring",text:"May is the month Blue Zones gardeners are most active. Eat something you grew, picked, or bought from someone who did."},{season:"Summer",text:"June is for nourishment. Blue Zones summers are built around fresh food eaten slowly with people you love. Eat the season fully."},{season:"Summer",text:"July is for water and friluftsliv. Scandinavians swim in cold lakes, walk barefoot, and sleep with the windows open."},{season:"Summer",text:"August is for creative hobbies. Amy sketched all summer. Jo wrote. Beth played. The long light gives you time. Use it."},{season:"Autumn",text:"September brings the harvest. Root vegetables, squash, apples. Eat what the season offers freely."},{season:"Autumn",text:"October is for connection. In Sardinia, October means communal feasts. Gather your people."},{season:"Autumn",text:"November is for faith and hygge. The days are short. Marmee counted her blessings out loud in November."},{season:"Winter",text:"December is the heart of hygge season. The March Christmas had very little and it was everything. Build warmth this month."}];

var WHY_INSPIRATIONS=[{label:"Blue Zones",color:"#3A6B3A",fg:"#224422",text:"The Blue Zones are five regions where people consistently live past 100: Okinawa in Japan, Sardinia in Italy, Nicoya in Costa Rica, Ikaria in Greece, and Loma Linda in California. They move naturally throughout the day, eat mostly plants, stop before they are full, and share meals with others. None of them are trying to live longer. They have simply built environments and habits that make long life the natural outcome."},{label:"Edwardian England",color:"#B07C08",fg:"#785204",text:"The Edwardian era, roughly 1901 to 1910, sits just before the industrialization of food and the collapse of structured daily rhythms. People walked everywhere. Fresh air was considered essential medicine. Duty, the faithful tending of ones responsibilities, was understood as a form of love, not burden."},{label:"Little Women",color:"#1E6E9E",fg:"#104868",text:"Louisa May Alcott published Little Women in 1868 and it has never been out of print. At the center is Marmee, a woman of deep faith, practical wisdom, and extraordinary warmth, who teaches her daughters not to chase happiness but to build it through small, consistent acts of goodness."},{label:"Scandinavian cultures",color:"#2A7A72",fg:"#1A4E48",text:"Denmark, Norway, Sweden, and Finland consistently rank among the happiest and healthiest countries on earth. Friluftsliv holds that time in nature is essential to human health regardless of weather. Hygge is about deliberately creating warmth in ordinary moments."}];

var WHY_PILLARS=[
  {label:"Faith",pid:"faith",tags:["Blue Zones","Little Women","Edwardian"],text:"A consistent spiritual practice is one of the most well-documented predictors of longevity and psychological resilience. This pillar requires 3 activities before it counts toward your cup, encouraging a fuller practice rather than a single quick check-in."},
  {label:"Movement",pid:"movement",tags:["Blue Zones","Edwardian","Scandinavian"],text:"Daily movement is the single most researched habit in longevity science. Fresh air compounds the effect: time outdoors lowers cortisol, improves sleep quality, and restores attentional capacity."},
  {label:"Nourishment",pid:"nourishment",tags:["Blue Zones","Edwardian","Little Women","Scandinavian"],text:"A diet built around whole foods, plants, and unhurried meals reduces chronic inflammation. This pillar requires 3 healthy behaviors before it counts toward your cup, because real nourishment is a pattern, not a single choice."},
  {label:"Water",pid:"water",tags:["Blue Zones","Edwardian","Scandinavian"],text:"Chronic mild dehydration is one of the most common contributors to fatigue, poor concentration, headaches, and low mood. Water requires 64 oz before it counts toward your cup."},
  {label:"Connection",pid:"connection",tags:["Blue Zones","Edwardian","Little Women","Scandinavian"],text:"Social isolation is as damaging to long-term health as smoking fifteen cigarettes a day. Strong social bonds are the most consistent predictor of happiness across cultures and age groups."},
  {label:"Service",pid:"service",tags:["Blue Zones","Little Women","Edwardian"],text:"Acts of service are among the most consistently mood-elevating behaviors in psychological research. Marmee taught her daughters that the surest way out of their own struggles was to look outward."},
  {label:"Stewardship",pid:"stewardship",tags:["Blue Zones","Edwardian","Little Women"],text:"Having things in your care gives the day shape and meaning. Tending faithfully to small things is one of the most underrated forms of self-care."},
  {label:"Creative Hobbies",pid:"creative",tags:["Edwardian","Little Women","Scandinavian"],text:"This pillar is not about professional output. It is about making things that fill you rather than drain you. Even ten minutes of something made for yourself is neurologically different from ten minutes of something consumed."},
  {label:"Joy & Hygge",pid:"joy",tags:["Blue Zones","Little Women","Scandinavian"],text:"The ability to notice and create small moments of warmth and pleasure is a trainable skill. You do not need large exceptional experiences. You need reliable small ones."},
  {label:"Rest",pid:"rest",tags:["Blue Zones","Edwardian","Little Women","Scandinavian"],text:"Sleep is when the body does its most essential maintenance. The evening routine is not indulgence. It is infrastructure."}
];

var TODAY=new Date();TODAY.setHours(0,0,0,0);
function isSunday(d){return d.getDay()===0;}
function getDateKey(d){return d.toISOString().slice(0,10);}
function offsetDate(base,days){var d=new Date(base);d.setDate(d.getDate()+days);return d;}
function getWeekDates(anchor){var dow=anchor.getDay(),sun=new Date(anchor);sun.setDate(anchor.getDate()-dow);return Array.from({length:7},function(_,i){var d=new Date(sun);d.setDate(sun.getDate()+i);return d;});}
function fmtDate(d){return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});}
function fmtShort(d){return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function localDayIndex(){var d=new Date();return d.getFullYear()*10000+d.getMonth()*100+d.getDate();}
function loadData(){try{return JSON.parse(localStorage.getItem("ftc-v3")||"{}");}catch(e){return {};}}
function saveData(d){try{localStorage.setItem("ftc-v3",JSON.stringify(d));}catch(e){}}
function loadCustomActs(){try{return JSON.parse(localStorage.getItem("ftc-custom-acts")||"{}");}catch(e){return {};}}
function saveCustomActs(d){try{localStorage.setItem("ftc-custom-acts",JSON.stringify(d));}catch(e){}}
function loadActEdits(){try{return JSON.parse(localStorage.getItem("ftc-act-edits")||"{}");}catch(e){return {};}}
function saveActEdits(d){try{localStorage.setItem("ftc-act-edits",JSON.stringify(d));}catch(e){}}
function loadActOrder(){try{return JSON.parse(localStorage.getItem("ftc-act-order")||"{}");}catch(e){return {};}}
function saveActOrder(d){try{localStorage.setItem("ftc-act-order",JSON.stringify(d));}catch(e){}}
function getPillar(id){for(var i=0;i<PILLARS.length;i++){if(PILLARS[i].id===id)return PILLARS[i];}return null;}

function getActivities(pid){
  var edits=state.actEdits[pid]||{};
  var deletions=edits.deletions||{};
  var renames=edits.renames||{};
  var builtin=(ACTIVITIES[pid]||[]).filter(function(a){return !deletions[a];}).map(function(a){return{orig:a,label:renames[a]||a,isCustom:false};});
  var custom=(state.customActs[pid]||[]).map(function(a,i){return{orig:a,label:a,isCustom:true,idx:i};});
  var all=builtin.concat(custom);
  var order=state.actOrder[pid];
  if(order&&order.length){
    var map={};
    all.forEach(function(a){map[a.orig]=a;});
    var ordered=[];
    order.forEach(function(orig){if(map[orig]){ordered.push(map[orig]);delete map[orig];}});
    all.forEach(function(a){if(map[a.orig])ordered.push(a);});
    return ordered;
  }
  return all;
}

function getPillarProgress(pid,splashes){
  var t=THRESHOLDS[pid];
  if(!t){return null;}
  var relevant=splashes.filter(function(s){return s.pillarId===pid;});
  var count=0;
  var label="";
  if(t.type==="oz"){
    count=relevant.filter(function(s){return s.label==="8 oz of water";}).length*8;
    label=count+" / "+t.goal+" oz";
  } else {
    var seen={};
    relevant.forEach(function(s){seen[s.label]=true;});
    count=Object.keys(seen).length;
    label=count+" / "+t.goal;
  }
  var met=count>=t.goal;
  return{count:count,goal:t.goal,met:met,label:label};
}

function getCupStats(splashes){
  var seenIds={};
  splashes.forEach(function(s){seenIds[s.pillarId]=true;});
  var allIds=Object.keys(seenIds);
  var uniquePillars=allIds.filter(function(pid){
    var t=THRESHOLDS[pid];
    if(!t){return true;}
    var prog=getPillarProgress(pid,splashes);
    return prog&&prog.met;
  });
  var total=splashes.length;
  var byPillar={};
  splashes.forEach(function(s){byPillar[s.pillarId]=(byPillar[s.pillarId]||0)+1;});
  var breakdown=allIds.map(function(id){
    var prog=getPillarProgress(id,splashes);
    var met=prog?prog.met:true;
    return{id:id,count:byPillar[id]||0,pct:total>0?Math.round((byPillar[id]||0)/total*100):0,pillar:getPillar(id),thresholdMet:met,progress:prog};
  });
  breakdown.sort(function(a,b){return b.count-a.count;});
  var uc=uniquePillars.length;
  return{uniquePillars:uniquePillars,uniqueCount:uc,fillLevel:Math.min(1,uc/10),breakdown:breakdown,total:total,allIds:allIds,splashes:splashes};
}

function buildNudge(data,todayKey){
  var todaySplashes=(data[todayKey]&&data[todayKey].splashes)||[];
  var todayPillarIds={};
  todaySplashes.forEach(function(s){todayPillarIds[s.pillarId]=true;});
  var past3=[1,2,3].map(function(i){return getDateKey(offsetDate(new Date(todayKey+"T12:00:00"),-i));});
  var neglected=PILLARS.filter(function(p){
    if(todayPillarIds[p.id]){return false;}
    return past3.every(function(k){var sp=(data[k]&&data[k].splashes)||[];return !sp.some(function(s){return s.pillarId===p.id;});});
  });
  if(!neglected.length){return null;}
  var idx=localDayIndex();
  var pick=neglected[idx%neglected.length];
  var pool=NUDGES[pick.id];
  if(!pool){return null;}
  return{pillar:pick.label,text:pool[idx%pool.length]};
}

function buildEncouragement(data){
  var past7=Array.from({length:7},function(_,i){return getDateKey(offsetDate(TODAY,-i-1));});
  var scored=PILLARS.map(function(p){
    return{id:p.id,label:p.label,count:past7.filter(function(k){
      var sp=(data[k]&&data[k].splashes)||[];
      return sp.some(function(s){return s.pillarId===p.id;});
    }).length};
  });
  var best=scored.reduce(function(a,b){return b.count>a.count?b:a;},scored[0]);
  if(best.count<3){return null;}
  var pool=ENCOURAGEMENT[best.id];
  if(!pool){return null;}
  return{pillar:best.label,count:best.count,text:pool[localDayIndex()%pool.length]};
}

function warmthBg(p){if(!p)return"#EEEAE2";if(p<0.3)return"#DDD9D0";if(p<0.55)return"#EEE0AA";if(p<0.8)return"#DFC06A";return"#C8A030";}
function warmthFg(p){if(!p)return"#747060";if(p<0.3)return"#3D3D30";if(p<0.55)return"#8A6010";if(p<0.8)return"#6A4808";return"#3A2800";}

function renderCup(stats){
  var uc=stats.uniqueCount,bd=stats.breakdown,tot=stats.total,up=stats.uniquePillars;
  var at80=uc>=8,full=uc>=10;
  var W=130,H=210,rimY=14,rimRx=50,baseY=H-20,baseRx=40,ry=4,bodyH=baseY-rimY;
  var lR=W/2-rimRx,rR=W/2+rimRx,lB=W/2-baseRx,rB=W/2+baseRx;
  function xL(y){return lR+(lB-lR)*(y-rimY)/bodyH;}
  function xR(y){return rR+(rB-rR)*(y-rimY)/bodyH;}
  var fillH=bodyH*Math.min(1,uc/10);
  var segs="";
  var patternDefs="";
  if(tot>0){
    var unmetIds=(stats.allIds||[]).filter(function(id){return up.indexOf(id)===-1;});
    var curY=baseY+ry;
    for(var i=0;i<up.length;i++){
      var b=null;
      for(var j=0;j<bd.length;j++){if(bd[j].id===up[i]){b=bd[j];break;}}
      if(!b){continue;}
      var sh=(b.count/tot)*(fillH+ry);
      var yBm=curY,yTm=curY-sh;
      var col=(b.pillar&&b.pillar.color)||"#CEC8BC";
      var xLt=xL(Math.min(yTm,baseY)),xRt=xR(Math.min(yTm,baseY));
      var xLb=xL(Math.min(yBm,baseY)),xRb=xR(Math.min(yBm,baseY));
      segs+="<polygon points='"+xLt.toFixed(1)+","+yTm.toFixed(1)+" "+xRt.toFixed(1)+","+yTm.toFixed(1)+" "+xRb.toFixed(1)+","+yBm.toFixed(1)+" "+xLb.toFixed(1)+","+yBm.toFixed(1)+"' fill='"+col+"' opacity='0.92'/>";
      curY=yTm;
    }
    for(var u=0;u<unmetIds.length;u++){
      var uid2=unmetIds[u];
      var prog=getPillarProgress(uid2,stats.splashes||[]);
      if(!prog){continue;}
      var ratio=Math.min(1,prog.count/prog.goal);
      if(ratio<=0){continue;}
      var b2=null;
      for(var j2=0;j2<bd.length;j2++){if(bd[j2].id===uid2){b2=bd[j2];break;}}
      if(!b2){continue;}
      var col2=(b2.pillar&&b2.pillar.color)||"#CEC8BC";
      var sliver=(b2.count/tot)*(fillH+ry)*ratio;
      var yBs=curY,yTs=curY-sliver;
      var xLts=xL(Math.min(yTs,baseY)),xRts=xR(Math.min(yTs,baseY));
      var xLbs=xL(Math.min(yBs,baseY)),xRbs=xR(Math.min(yBs,baseY));
      var patId="stripe-"+uid+"-"+u;
      patternDefs+="<pattern id='"+patId+"' patternUnits='userSpaceOnUse' width='6' height='6' patternTransform='rotate(45)'>"
        +"<rect width='6' height='6' fill='"+col2+"' opacity='0.18'/>"
        +"<line x1='0' y1='0' x2='0' y2='6' stroke='"+col2+"' stroke-width='3' opacity='0.55'/>"
        +"</pattern>";
      segs+="<polygon points='"+xLts.toFixed(1)+","+yTs.toFixed(1)+" "+xRts.toFixed(1)+","+yTs.toFixed(1)+" "+xRbs.toFixed(1)+","+yBs.toFixed(1)+" "+xLbs.toFixed(1)+","+yBs.toFixed(1)+"' fill='url(#"+patId+")'/>";
      curY=yTs;
    }
  }
  var l80Y=rimY+bodyH*0.2,ll=xL(l80Y)+2,lr=xR(l80Y)-2;
  var l80=!full?"<line x1='"+ll.toFixed(1)+"' y1='"+l80Y.toFixed(1)+"' x2='"+lr.toFixed(1)+"' y2='"+l80Y.toFixed(1)+"' stroke='"+(at80?"#2A5C39":C.parchDark)+"' stroke-width='0.9' stroke-dasharray='3,3' opacity='"+(at80?0.6:0.4)+"'/><text x='"+(ll-3).toFixed(1)+"' y='"+(l80Y+4).toFixed(1)+"' text-anchor='end' font-family='Inter,sans-serif' font-size='8' fill='"+C.inkLight+"' opacity='0.5'>80%</text>":"";
  var sk=full?"#1A4E48":C.parchDark,sw=full?1.6:1.1;
  var uid="c"+(Math.random()*1e8|0);
  var clipPath="M "+lR+","+rimY+" L "+rR+","+rimY+" L "+rB+","+baseY+" A "+baseRx+","+ry+" 0 0,1 "+lB+","+baseY+" Z";
  var svg="<svg width='"+W+"' height='"+(H+20)+"' viewBox='0 0 "+W+" "+(H+20)+"' style='overflow:visible'>"
    +"<defs><clipPath id='"+uid+"'><path d='"+clipPath+"'/></clipPath>"+patternDefs+"</defs>"
    +"<path d='"+clipPath+"' fill='"+C.parchment+"'/>"
    +"<ellipse cx='"+W/2+"' cy='"+baseY+"' rx='"+baseRx+"' ry='"+ry+"' fill='"+C.cream+"' stroke='"+sk+"' stroke-width='"+sw+"'/>"
    +"<g clip-path='url(#"+uid+")'>"+segs+"</g>"
    +l80
    +"<line x1='"+lR+"' y1='"+rimY+"' x2='"+lB+"' y2='"+baseY+"' stroke='"+sk+"' stroke-width='"+sw+"'/>"
    +"<line x1='"+rR+"' y1='"+rimY+"' x2='"+rB+"' y2='"+baseY+"' stroke='"+sk+"' stroke-width='"+sw+"'/>"
    +"<ellipse cx='"+W/2+"' cy='"+rimY+"' rx='"+rimRx+"' ry='5.5' fill='"+C.cream+"' stroke='"+sk+"' stroke-width='"+sw+"'/>"
    +"<path d='M "+(W/2-baseRx)+" "+baseY+" A "+baseRx+" "+ry+" 0 0 0 "+(W/2+baseRx)+" "+baseY+"' fill='none' stroke='"+sk+"' stroke-width='"+sw+"'/>"
    +"<ellipse cx='"+W/2+"' cy='"+(baseY+ry)+"' rx='"+(baseRx-6)+"' ry='1.8' fill='"+C.parchDark+"' opacity='0.1'/>"
    +"</svg>";
  var stxt=full?"Cup full - a wonderful day":at80?"80% - that is enough":uc===0?"Add your first splash":uc+" of 10 pillars";
  var scol=(full||at80)?"#2A5C39":C.inkLight;
  return "<div style='display:flex;flex-direction:column;align-items:center;gap:10px'>"+svg
    +"<div style='text-align:center'>"
    +"<span style='font-family:Georgia,serif;font-size:26px;color:"+(full?"#2A5C39":C.ink)+"'>"+uc+"</span>"
    +"<span style='font-family:Inter,sans-serif;font-size:14px;color:"+C.inkLight+"'> / 10 pillars</span>"
    +"<div style='font-family:Inter,sans-serif;font-size:11px;color:"+scol+";margin-top:3px;letter-spacing:0.05em;text-transform:uppercase'>"+stxt+"</div>"
    +"</div></div>";
}

function renderMiniCup(stats,size){
  size=size||30;
  var uc=stats.uniqueCount,bd=stats.breakdown,tot=stats.total,up=stats.uniquePillars;
  var W=size,H=size*1.45,rimY=H*0.09,rimRx=W*0.42,baseY=H-H*0.09,baseRx=W*0.34,ry=H*0.035,bodyH=baseY-rimY;
  var lR=W/2-rimRx,rR=W/2+rimRx,lB=W/2-baseRx,rB=W/2+baseRx;
  function xLm(y){return lR+(lB-lR)*(y-rimY)/bodyH;}
  function xRm(y){return rR+(rB-rR)*(y-rimY)/bodyH;}
  var fillH=bodyH*Math.min(1,uc/10),segs="";
  if(tot>0&&uc>0){
    var cy=baseY+ry;
    for(var i=0;i<up.length;i++){
      var b=null;for(var j=0;j<bd.length;j++){if(bd[j].id===up[i]){b=bd[j];break;}}
      if(!b){continue;}
      var sh=(b.count/tot)*(fillH+ry),yB=cy,yT=cy-sh;
      var col=(b.pillar&&b.pillar.color)||"#CEC8BC";
      var xLt=xLm(Math.min(yT,baseY)),xRt=xRm(Math.min(yT,baseY));
      var xLb=xLm(Math.min(yB,baseY)),xRb=xRm(Math.min(yB,baseY));
      segs+="<polygon points='"+xLt.toFixed(1)+","+yT.toFixed(1)+" "+xRt.toFixed(1)+","+yT.toFixed(1)+" "+xRb.toFixed(1)+","+yB.toFixed(1)+" "+xLb.toFixed(1)+","+yB.toFixed(1)+"' fill='"+col+"' opacity='0.9'/>";
      cy=yT;
    }
  }
  var sk=uc>=8?"#1A4E48":C.parchDark;
  var uid="m"+(Math.random()*1e9|0);
  var clipPath="M "+lR+","+rimY+" L "+rR+","+rimY+" L "+rB+","+baseY+" A "+baseRx+","+ry+" 0 0,1 "+lB+","+baseY+" Z";
  return "<svg width='"+W+"' height='"+(H+ry*2)+"' viewBox='0 0 "+W+" "+(H+ry*2)+"'>"
    +"<defs><clipPath id='"+uid+"'><path d='"+clipPath+"'/></clipPath></defs>"
    +"<path d='"+clipPath+"' fill='"+C.parchment+"'/>"
    +"<ellipse cx='"+W/2+"' cy='"+baseY+"' rx='"+baseRx+"' ry='"+ry+"' fill='"+C.cream+"' stroke='"+sk+"' stroke-width='0.8'/>"
    +"<g clip-path='url(#"+uid+")'>"+segs+"</g>"
    +"<line x1='"+lR+"' y1='"+rimY+"' x2='"+lB+"' y2='"+baseY+"' stroke='"+sk+"' stroke-width='0.8'/>"
    +"<line x1='"+rR+"' y1='"+rimY+"' x2='"+rB+"' y2='"+baseY+"' stroke='"+sk+"' stroke-width='0.8'/>"
    +"<ellipse cx='"+W/2+"' cy='"+rimY+"' rx='"+rimRx+"' ry='"+(H*0.045)+"' fill='"+C.cream+"' stroke='"+sk+"' stroke-width='0.8'/>"
    +"<path d='M "+(W/2-baseRx)+" "+baseY+" A "+baseRx+" "+ry+" 0 0 0 "+(W/2+baseRx)+" "+baseY+"' fill='none' stroke='"+sk+"' stroke-width='0.8'/>"
    +"</svg>";
}

var EDIT_ICON="<svg width='13' height='13' viewBox='0 0 13 13' fill='none'><path d='M9 2l2 2-7 7H2V9l7-7z' stroke='#747060' stroke-width='1.4' stroke-linejoin='round'/></svg>";
var CLOSE_ICON="<svg width='14' height='14' viewBox='0 0 14 14' fill='none'><path d='M2 2l10 10M12 2L2 12' stroke='#747060' stroke-width='1.8' stroke-linecap='round'/></svg>";

var state={
  view:"today",data:loadData(),customActs:loadCustomActs(),actEdits:loadActEdits(),actOrder:loadActOrder(),
  dayOffset:0,weekOffset:0,monthOffset:0,
  showSheet:false,sheetStep:"pillar",sheetPillar:null,selectedActivities:{},waterCount:1,
  confirmClear:false,toast:null,toastTimer:null,openWhyPillars:{},
  editingIdx:null,editLabel:"",editPillarId:null,
  saveCustom:false,managingPillar:null,editingActKey:null,editingActVal:""
};

function getViewDate(){return offsetDate(TODAY,state.dayOffset);}
function getViewKey(){return getDateKey(getViewDate());}

  return "<div style='background:"+C.cream+";min-height:100vh'>"
    +(state.confirmClear?buildConfirm():"")

    +(state.view==="today"&&!isViewSunday()?"<div class='fab'><button onclick='openSheet()' style='padding:14px 36px;border-radius:30px;border:none;background:#2A7A72;color:#F8F6F1;font-family:Georgia,serif;font-size:18px;box-shadow:0 4px 20px rgba(42,122,114,0.35)'>+ Splash</button></div>":"")
    +"</div>";
}

    +"</div>"
    +"<div style='margin-top:14px;padding-top:14px;border-top:1px dashed "+C.parchDark+"'>"

    +"<div style='text-align:center'>"

    +(!isToday?"<button onclick='addDayOffset("+(-state.dayOffset)+")' style='background:none;border:none;font-family:Inter,sans-serif;font-size:13px;color:"+C.inkMid+";text-decoration:underline;padding:2px 0 0'>Back to today</button>":"")
    +"</div>"
    +"<button class='nav-btn' onclick='addDayOffset(1)'"+(state.dayOffset>=0?" disabled":"")+">Later</button>"
    +"</div>";
  if(isViewSunday()){
    return nav
      +"<div style='margin-top:32px;display:flex;flex-direction:column;align-items:center;text-align:center;padding:32px 20px;border-radius:8px;background:"+C.parchment+";border:1px solid "+C.parchDark+"'>"
      +"<div style='font-size:36px;margin-bottom:16px'>&#9749;</div>"
      +"<p style='font-family:Georgia,serif;font-size:22px;color:"+C.ink+";margin-bottom:10px;font-weight:400'>Sunday rest</p>"
      +"<p style='font-family:Inter,sans-serif;font-size:14px;color:"+C.inkLight+";line-height:1.8;max-width:280px'>No tracking today. Sundays are for rest, not record-keeping. The cup will be here Monday.</p>"
      +"</div>";
  }
  var past=!isToday?"<div style='margin-bottom:16px;padding:12px 16px;border-radius:4px;background:"+(uc>0?warmthBg(fl):C.parchment)+";border:1px solid "+C.parchDark+"'>"
    +"<p style='font-family:Georgia,serif;font-style:italic;font-size:15px;color:"+(uc>0?warmthFg(fl):C.inkLight)+";margin:0'>"
    +(uc>0?uc+" pillars - "+Math.round(fl*100)+"%"+(at80?" - a good day.":"."):(fmtDate(vd)+" - nothing logged yet."))
    +"</p></div>":"";
  var banner=isToday&&at80?"<div style='margin-bottom:16px;padding:12px 16px;border-radius:4px;background:#D4F0EC;border-left:3px solid #1A4E48'>"
    +"<p style='font-family:Georgia,serif;font-style:italic;font-size:15px;color:#1A4E48;line-height:1.7;margin:0'>"
    +(uc>=10?"A truly full cup. Every pillar tended to.":"You reached your 80 today. That is enough.")
    +"</p></div>":"";
  var nc=nudge||enc;
  var nudgeCard=isToday&&nc?"<div style='margin-bottom:14px;padding:12px 16px;border-radius:4px;background:"+(nudge?C.goldPale:"#D4F0EC")+";border-left:3px solid "+(nudge?C.gold:"#2A7A72")+"'>"
    +"<p style='font-family:Georgia,serif;font-style:italic;font-size:13px;color:"+C.inkMid+";line-height:1.7;margin:0'>"+nc.text+"</p>"
    +"<p style='font-family:Inter,sans-serif;font-size:11px;color:"+(nudge?C.gold:"#2A7A72")+";margin:8px 0 0;letter-spacing:0.05em;text-transform:uppercase'>"+(nudge?nudge.pillar+" - has not shown up in a few days":enc.pillar+" - "+enc.count+" of the last 7 days")+"</p>"

function buildWeek(){
  var DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function buildMonth(){
  var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var DAYS_S=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var monthRef=new Date(TODAY.getFullYear(),TODAY.getMonth()+state.monthOffset,1);
  var y=monthRef.getFullYear(),m=monthRef.getMonth(),last=new Date(y,m+1,0),dow=new Date(y,m,1).getDay();
  var s=SEASONAL[new Date().getMonth()],mn=MONTHS[new Date().getMonth()];
  var cells="<div></div>".repeat(dow);
  for(var d=1;d<=last.getDate();d++){
    var dt=new Date(y,m,d),key=getDateKey(dt),stats=getCupStats((state.data[key]&&state.data[key].splashes)||[]);
    var n=stats.uniqueCount,pct=n/10,isTodayCell=key===getDateKey(TODAY),isFuture=dt>TODAY,isSun=isSunday(dt);
    cells+="<div "+(isFuture||isSun?"":"data-key='"+key+"' onclick='jumpToDay(this.dataset.key)'")+
      " style='aspect-ratio:1;border-radius:4px;background:"+(isSun?C.parchment:isFuture?C.cream:n>0?warmthBg(pct):C.parchment)+";border:"+(isTodayCell?"2":"1")+"px solid "+(isTodayCell?"#2A7A72":C.parchDark)+";display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:"+(isFuture||isSun?"default":"pointer")+";opacity:"+(iFuture||isSun?0.35:1)+"'>"
      +"<span style='font-family:Inter,sans-serif;font-size:12px;color:"+(isFuture||isSun?C.inkLight:n>0?warmthFg(pct):C.inkLight)+";font-weight:"+(isTodayCell?700:400)+"'>"+d+"</span>"
      +(n>0&&!isFuture&&!isSun?"<span style='font-family:Inter,sans-serif;font-size:9px;color:"+warmthFg(pct)+";opacity:0.85;margin-top:1px'>"+n+"</span>":"")
      +"</div>";
  }
  var scores=[],at80c=0;
  for(var dd=1;dd<=last.getDate();dd++){
    var dt2=new Date(y,m,dd);
    if(dt2>TODAY||isSunday(dt2)){continue;}
    var st=getCupStats((state.data[getDateKey(dt2)]&&state.data[getDateKey(dt2)].splashes)||[]);
    if(st.uniqueCount>0){scores.push(st.uniqueCount/10);if(st.uniqueCount>=8){at80c++;}}
  }
  var cnt=scores.length,avg=cnt?Math.round(scores.reduce(function(a,b){return a+b;},0)/cnt*100):0,best=cnt?Math.round(Math.max.apply(null,scores)*100):0;
  var mByP={},mTot=0;
  for(var ddd=1;ddd<=last.getDate();ddd++){
    var dt3=new Date(y,m,ddd);
    if(dt3>TODAY||isSunday(dt3)){continue;}
    var sp2=(state.data[getDateKey(dt3)]&&state.data[getDateKey(dt3)].splashes)||[];
    sp2.forEach(function(s2){mByP[s2.pillarId]=(mByP[s2.pillarId]||0)+1;mTot++;});
  }
  var top3=Object.keys(mByP).map(function(id){return{id:id,cnt:mByP[id]};}).sort(function(a,b){return b.cnt-a.cnt;}).slice(0,3).map(function(x){var p=getPillar(x.id);return{p:p,cnt:x.cnt,pct:mTot>0?Math.round(x.cnt/mTot*100):0};});
  var top3Html=top3.length>0?"<div style='border-top:1px solid "+C.parchDark+";padding-top:18px;margin-bottom:24px'>"
    +"<p style='font-family:Georgia,serif;font-size:15px;color:"+C.inkLight+";font-style:italic;margin-bottom:14px'>Most active pillars this month</p>"
    +top3.map(function(x,i){
      return "<div style='display:flex;align-items:center;gap:10px;margin-bottom:10px'>"
        +"<div style='width:22px;height:22px;border-radius:50%;background:"+x.p.color+";display:flex;align-items:center;justify-content:center;flex-shrink:0'><span style='font-family:Inter,sans-serif;font-size:11px;font-weight:700;color:#fff'>"+(i+1)+"</span></div>"
        +"<div style='flex:1'><div style='font-family:Inter,sans-serif;font-size:14px;color:"+C.ink+"'>"+x.p.label+"</div><div style='font-family:Inter,sans-serif;font-size:12px;color:"+C.inkLight+"'>"+x.cnt+" splash"+(x.cnt!==1?"es":"")+" - "+x.pct+"% of the month</div></div>"
        +"</div>";
    }).join("")+"</div>":"";
  return "<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:20px'>"
    +"<button class='nav-btn' onclick='addMonthOffset(-1)'>Earlier</button>"
    +"<div style='font-family:Georgia,serif;font-size:15px;color:"+C.ink+"'>"+MONTHS[m]+" "+y+"</div>"
    +"<button class='nav-btn' onclick='addMonthOffset(1)'"+(state.monthOffset>=0?" disabled":"")+">Later</button>"
    +"</div>"
    +"<div style='display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px'>"+DAYS_S.map(function(d){return "<div style='font-family:Inter,sans-serif;font-size:11px;color:"+C.inkLight+";text-align:center;text-transform:uppercase;letter-spacing:0.05em'>"+d+"</div>";}).join("")+"</div>"
    +"<div style='display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:18px'>"+cells+"</div>"
    +"<div style='display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px'>"+[["#DDD9D0","Just starting"],["#EEE0AA","Building"],["#DFC06A","Almost there"],["#C8A030","80% reached"]].map(function(x){return "<div style='display:flex;align-items:center;gap:5px;font-family:Inter,sans-serif;font-size:12px;color:"+C.inkLight+"'><div style='width:11px;height:11px;border-radius:2px;background:"+x[0]+";border:1px solid "+C.parchDark+"'></div>"+x[1]+"</div>";}).join("")+"</div>"
    +"<div style='border-top:1px solid "+C.parchDark+";padding-top:18px;margin-bottom:24px'>"
    +"<p style='font-family:Georgia,serif;font-size:15px;color:"+C.inkLight+";font-style:italic;margin-bottom:14px'>This month at a glance</p>"
    +"<div style='display:grid;grid-template-columns:1fr 1fr;gap:10px'>"+[["Days logged",cnt],["Days at 80%+",at80c],["Avg fill",cnt?avg+"%":"--"],["Best day",cnt?best+"%":"--"]].map(function(x){return "<div style='padding:14px 16px;border-radius:4px;background:"+C.parchment+";border:1px solid "+C.parchDark+"'><div style='font-family:Georgia,serif;font-size:24px;color:"+C.ink+";margin-bottom:4px'>"+x[1]+"</div><div style='font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+"'>"+x[0]+"</div></div>";}).join("")+"</div>"
    +"</div>"+top3Html
    +"<div style='padding:20px 22px;border-radius:6px;background:"+C.parchment+";border-left:3px solid #82B882'>"
    +"<p style='font-family:Georgia,serif;font-style:italic;font-size:15px;color:"+C.inkMid+";line-height:1.8;margin:0'>"+s.text+"</p>"
    +"<p style='font-family:Inter,sans-serif;font-size:11px;color:"+C.inkLight+";margin-top:12px;letter-spacing:0.05em;text-transform:uppercase'>"+s.season+" - "+mn+"</p>"
    +"</div>";
}

    var safeAct=act.label.replace(/\\/g,"\\\\").replace(/"/g,"&quot;");
    return "<button class='activity-row' onclick='toggleActivity(\""+safeAct+"\")'>"
      +"<div style='display:flex;align-items:center;gap:10px'>"
      +"<div style='width:16px;height:16px;border-radius:3px;border:1.5px solid "+(isSel?p.color:C.parchDark)+";background:"+(isSel?p.color:"transparent")+";display:flex;align-items:center;justify-content:center;flex-shrink:0'>"
      +(isSel?"<svg width='10' height='10' viewBox='0 0 10 10'><path d='M1.5 5.5l2.5 2.5 5-5' stroke='#fff' stroke-width='1.6' fill='none' stroke-linecap='round'/></svg>":"")
      +"</div><span>"+act.label+"</span></div></button>";
  }).join("");
  var selCount=Object.keys(sel).length;
  var saveToggleHtml="<label class='save-toggle'>"
    +"<div style='width:18px;height:18px;border-radius:3px;border:1.5px solid "+(state.saveCustom?p.color:C.parchDark)+";background:"+(state.saveCustom?p.color:"transparent")+";display:flex;align-items:center;justify-content:center;flex-shrink:0' onclick='toggleSaveCustom()'>"
    +(state.saveCustom?"<svg width='10' height='10' viewBox='0 0 10 10'><path d='M1.5 5.5l2.5 2.5 5-5' stroke='#fff' stroke-width='1.6' fill='none' stroke-linecap='round'/></svg>":"")
    +"</div><span onclick='toggleSaveCustom()'>Save to my list for this pillar</span></label>";
  return "<div class='sheet-overlay' onclick='if(event.target===this)closeSheet()'>"
    +"<div class='sheet'>"
    +"<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:20px'>"
    +"<div><button onclick='backToStep1()' style='background:none;border:none;font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+";text-decoration:underline;margin-bottom:4px'>Back</button>"
    +"<div style='font-family:Georgia,serif;font-size:20px;color:"+p.dark+"'>"+p.label+"</div>"
    +"<div style='font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+";margin-top:3px'>Tap to select. Choose as many as apply.</div></div>"
    +"<button onclick='closeSheet()' style='background:none;border:none;padding:4px'>"+CLOSE_ICON+"</button></div>"
    +"<div>"+actRows+"</div>"
    +"<div style='margin-top:14px;padding-top:12px;border-top:1px solid "+C.parchDark+"'>"
    +"<div style='font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+";margin-bottom:7px'>Or write your own:</div>"
    +"<div style='display:flex;gap:8px;margin-bottom:8px'>"
    +"<input id='cai' class='custom-input' type='text' placeholder='What did you do?' onkeydown='if(event.key===\"Enter\"){event.preventDefault();addCustom();}'/>"
    +"<button onclick='addCustom()' style='padding:9px 16px;border-radius:4px;border:none;background:"+p.color+";color:#fff;font-family:Inter,sans-serif;font-size:13px'>Add</button>"
    +"</div>"+saveToggleHtml+"</div>"
    +(selCount>0?"<div style='margin-top:16px;padding-top:14px;border-top:1px solid "+C.parchDark+";display:flex;align-items:center;justify-content:space-between'>"
      +"<div style='font-family:Inter,sans-serif;font-size:13px;color:"+C.inkMid+"'>"+selCount+" selected</div>"
      +"<button onclick='confirmActivities()' style='padding:10px 24px;border-radius:6px;border:none;background:"+p.color+";color:#fff;font-family:Georgia,serif;font-size:15px'>Add "+(selCount>1?selCount+" splashes":"splash")+"</button>"
      +"</div>":"")
    +"</div></div>";
}

function buildWaterSheet(p){
  var wc=state.waterCount;
  var customActs=state.customActs[p.id]||[];
  var sel=state.selectedActivities[p.id]||{};
  var customRows="";
  if(customActs.length>0){
    customRows="<div style='margin-bottom:12px'>"
      +"<div style='font-family:Inter,sans-serif;font-size:11px;color:"+C.inkLight+";letter-spacing:0.06em;text-transform:uppercase;padding:0 0 6px'>My activities</div>"
      +customActs.map(function(act){
        var isSel=!!sel[act];
        var safeAct=act.replace(/\\/g,"\\\\").replace(/"/g,"&quot;");
        return "<button class='activity-row' onclick='toggleActivity(\""+safeAct+"\")'>"
          +"<div style='display:flex;align-items:center;gap:10px'>"
          +"<div style='width:16px;height:16px;border-radius:3px;border:1.5px solid "+(isSel?p.color:C.parchDark)+";background:"+(isSel?p.color:"transparent")+";display:flex;align-items:center;justify-content:center;flex-shrink:0'>"
          +(isSel?"<svg width='10' height='10' viewBox='0 0 10 10'><path d='M1.5 5.5l2.5 2.5 5-5' stroke='#fff' stroke-width='1.6' fill='none' stroke-linecap='round'/></svg>":"")
          +"</div><span>"+act+"</span></div></button>";
      }).join("")+"</div>";
  }
  var selCount=Object.keys(sel).length;
  var saveToggleHtml="<label class='save-toggle'>"
    +"<div style='width:18px;height:18px;border-radius:3px;border:1.5px solid "+(state.saveCustom?p.color:C.parchDark)+";background:"+(state.saveCustom?p.color:"transparent")+";display:flex;align-items:center;justify-content:center;flex-shrink:0' onclick='toggleSaveCustom()'>"
    +(state.saveCustom?"<svg width='10' height='10' viewBox='0 0 10 10'><path d='M1.5 5.5l2.5 2.5 5-5' stroke='#fff' stroke-width='1.6' fill='none' stroke-linecap='round'/></svg>":"")
    +"</div><span onclick='toggleSaveCustom()'>Save to my list for this pillar</span></label>";
  return "<div class='sheet-overlay' onclick='if(event.target===this)closeSheet()'>"
    +"<div class='sheet'>"
    +"<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:20px'>"
    +"<div><button onclick='backToStep1()' style='background:none;border:none;font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+";text-decoration:underline;margin-bottom:4px'>Back</button>"
    +"<div style='font-family:Georgia,serif;font-size:20px;color:"+p.dark+"'>Water</div>"
    +"<div style='font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+";margin-top:3px'>Log glasses or add a custom activity.</div></div>"
    +"<button onclick='closeSheet()' style='background:none;border:none;padding:4px'>"+CLOSE_ICON+"</button></div>"
    +customRows
    +"<div style='font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+";margin-bottom:6px'>Glasses (8 oz each)</div>"
    +"<div class='water-stepper'>"
    +"<button class='w-btn' onclick='adjWater(-1)'"+(wc<=1?" disabled":"")+">-</button>"
    +"<div class='w-count'>"+wc+"</div>"
    +"<button class='w-btn' onclick='adjWater(1)'>+</button>"
    +"</div>"
    +"<div style='text-align:center;font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+";margin-bottom:12px'>"+wc*8+" oz total</div>"
    +"<button onclick='confirmWater()' style='display:block;width:100%;padding:13px;border-radius:6px;border:none;background:"+p.color+";color:#fff;font-family:Georgia,serif;font-size:17px;margin-bottom:"+(selCount>0?"12":"0")+"px'>Add "+wc+" glass splash"+(wc!==1?"es":"")+"</button>"
    +(selCount>0?"<div style='padding-top:12px;border-top:1px solid "+C.parchDark+";display:flex;align-items:center;justify-content:space-between'>"
      +"<div style='font-family:Inter,sans-serif;font-size:13px;color:"+C.inkMid+"'>"+selCount+" activity selected</div>"
      +"<button onclick='confirmActivities()' style='padding:10px 24px;border-radius:6px;border:none;background:"+p.color+";color:#fff;font-family:Georgia,serif;font-size:15px'>Add splash</button>"
      +"</div>":"")
    +"<div style='margin-top:14px;padding-top:12px;border-top:1px solid "+C.parchDark+"'>"
    +"<div style='font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+";margin-bottom:7px'>Or write your own:</div>"
    +"<div style='display:flex;gap:8px;margin-bottom:8px'>"
    +"<input id='cai' class='custom-input' type='text' placeholder='What did you do?' onkeydown='if(event.key===\"Enter\"){event.preventDefault();addCustom();}'/>"
    +"<button onclick='addCustom()' style='padding:9px 16px;border-radius:4px;border:none;background:"+p.color+";color:#fff;font-family:Inter,sans-serif;font-size:13px'>Add</button>"
    +"</div>"+saveToggleHtml+"</div>"
    +"</div></div>";
}

function buildConfirm(){
  return "<div class='modal-overlay'><div class='modal'>"
    +"<p style='font-family:Georgia,serif;font-size:17px;color:"+C.ink+";margin-bottom:8px'>Clear this day?</p>"
    +"<p style='font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+";margin-bottom:24px;line-height:1.6'>All splashes for this day will be removed.</p>"
    +"<div style='display:flex;gap:10px'>"
    +"<button onclick='state.confirmClear=false;render()' style='flex:1;padding:10px;border-radius:6px;border:1px solid "+C.parchDark+";background:transparent;font-family:Inter,sans-serif;font-size:14px;color:"+C.inkMid+"'>Cancel</button>"
    +"<button onclick='clearDay()' style='flex:1;padding:10px;border-radius:6px;border:none;background:"+C.clay+";font-family:Inter,sans-serif;font-size:14px;color:#fff'>Clear</button>"
    +"</div></div></div>";
}

function buildToast(){
  return "<div class='toast'><span>"+state.toast.message+"</span>"
    +"<button onclick='undoToast()' style='background:none;border:1px solid rgba(255,255,255,0.4);border-radius:4px;color:#F8F6F1;font-family:Inter,sans-serif;font-size:13px;padding:3px 10px'>Undo</button>"
    +"</div>";
}

function setView(v){state.view=v;render();}
function addDayOffset(n){state.dayOffset=Math.min(0,state.dayOffset+n);render();}
function addWeekOffset(n){state.weekOffset=Math.min(0,state.weekOffset+n);render();}
function addMonthOffset(n){state.monthOffset=Math.min(0,state.monthOffset+n);render();}
function jumpToDay(key){var dt=new Date(key+"T12:00:00");state.dayOffset=Math.round((dt-TODAY)/86400000);state.view="today";render();}
function toggleWhy(label){state.openWhyPillars[label]=!state.openWhyPillars[label];render();}
function openSheet(){state.showSheet=true;state.sheetStep="pillar";state.sheetPillar=null;state.selectedActivities={};state.waterCount=1;state.saveCustom=false;render();}
function closeSheet(){state.showSheet=false;state.selectedActivities={};state.saveCustom=false;render();}
function backToStep1(){state.sheetStep="pillar";state.sheetPillar=null;state.selectedActivities={};state.saveCustom=false;render();}
function selectPillar(id){state.sheetPillar=getPillar(id);state.sheetStep="activity";if(!state.selectedActivities[id]){state.selectedActivities[id]={};}render();}
function toggleActivity(act){var id=state.sheetPillar.id;if(!state.selectedActivities[id]){state.selectedActivities[id]={};}if(state.selectedActivities[id][act]){delete state.selectedActivities[id][act];}else{state.selectedActivities[id][act]=true;}render();}
function toggleSaveCustom(){state.saveCustom=!state.saveCustom;render();}

function addCustom(){
  var el=document.getElementById("cai");if(!el){return;}
  var val=el.value.trim();if(!val){return;}
  var id=state.sheetPillar.id;
  if(!state.selectedActivities[id]){state.selectedActivities[id]={};}
  state.selectedActivities[id][val]=true;
  if(state.saveCustom){
    if(!state.customActs[id]){state.customActs[id]=[];}
    if(state.customActs[id].indexOf(val)===-1){state.customActs[id].push(val);}
    saveCustomActs(state.customActs);
  }
  render();
  var nel=document.getElementById("cai");if(nel){nel.value="";nel.focus();}
}

function confirmActivities(){
  var id=state.sheetPillar.id,sel=state.selectedActivities[id]||{},acts=Object.keys(sel);
  if(!acts.length){return;}
  var key=getViewKey(),cur=state.data[key]||{},existing=cur.splashes||[];
  var newSplashes=acts.map(function(label,i){return{pillarId:id,label:label,timestamp:Date.now()+i};});
  state.data[key]=Object.assign({},cur,{splashes:existing.concat(newSplashes)});
  saveData(state.data);state.showSheet=false;state.selectedActivities={};state.saveCustom=false;render();
}

function adjWater(n){state.waterCount=Math.max(1,Math.min(16,(state.waterCount||1)+n));render();}
function confirmWater(){
  var key=getViewKey(),cur=state.data[key]||{},n=state.waterCount,existing=cur.splashes||[];
  var newSplashes=[];
  for(var i=0;i<n;i++){newSplashes.push({pillarId:"water",label:"8 oz of water",timestamp:Date.now()+i});}
  state.data[key]=Object.assign({},cur,{splashes:existing.concat(newSplashes)});
  saveData(state.data);state.showSheet=false;state.waterCount=1;render();
}

function removeSplash(idx){
  var key=getViewKey(),snap=JSON.parse(JSON.stringify(state.data[key]));
  var label=state.data[key]&&state.data[key].splashes&&state.data[key].splashes[idx]?state.data[key].splashes[idx].label:"";
  state.data[key].splashes.splice(idx,1);saveData(state.data);
  showToast(label?"Removed: "+label:"Splash removed",function(){state.data[key]=snap;saveData(state.data);render();});render();
}
function clearDay(){state.data[getViewKey()]={};saveData(state.data);state.confirmClear=false;render();}
function showToast(msg,undoFn){if(state.toastTimer){clearTimeout(state.toastTimer);}state.toast={message:msg,undoFn:undoFn};state.toastTimer=setTimeout(function(){state.toast=null;render();},4000);render();}
function undoToast(){if(state.toastTimer){clearTimeout(state.toastTimer);}if(state.toast&&state.toast.undoFn){state.toast.undoFn();}state.toast=null;render();}

function startEdit(idx){
  var splashes=getSplashes();
  state.editingIdx=idx;state.editLabel=splashes[idx].label;state.editPillarId=splashes[idx].pillarId;render();
  setTimeout(function(){var el=document.getElementById("edit-input-"+idx);if(el){el.focus();el.select();}},30);
}
function cancelEdit(){state.editingIdx=null;state.editLabel="";state.editPillarId=null;render();}
function setEditPillar(id){state.editPillarId=id;render();setTimeout(function(){var el=document.getElementById("edit-input-"+state.editingIdx);if(el){el.focus();}},20);}
function saveEdit(idx){
  var key=getViewKey(),label=(state.editLabel||"").trim();if(!label){return;}
  var splashes=state.data[key]&&state.data[key].splashes?state.data[key].splashes:[];
  if(!splashes[idx]){return;}
  splashes[idx]=Object.assign({},splashes[idx],{label:label,pillarId:state.editPillarId||splashes[idx].pillarId});
  state.data[key]=Object.assign({},state.data[key],{splashes:splashes});
  saveData(state.data);state.editingIdx=null;state.editLabel="";state.editPillarId=null;render();
}

function setManagingPillar(id){state.managingPillar=state.managingPillar===id?null:id;state.editingActKey=null;render();setTimeout(function(){var el=document.getElementById("why-custom-input");if(el){el.focus();}},30);}
function addCustomActWhy(pid){
  var el=document.getElementById("why-custom-input");if(!el){return;}
  var val=el.value.trim();if(!val){return;}
  if(!state.customActs[pid]){state.customActs[pid]=[];}
  if(state.customActs[pid].indexOf(val)===-1){state.customActs[pid].push(val);saveCustomActs(state.customActs);}
  render();setTimeout(function(){var nel=document.getElementById("why-custom-input");if(nel){nel.value="";nel.focus();}},30);
}
function startActEdit(pid,orig,currentLabel){
  state.editingActKey=pid+"::"+orig;state.editingActVal=currentLabel;render();
  setTimeout(function(){var el=document.getElementById("manage-edit-input");if(el){el.focus();el.select();}},30);
}
function saveActEdit(){
  if(!state.editingActKey){return;}
  var val=(state.editingActVal||"").trim();
  if(!val){state.editingActKey=null;render();return;}
  var parts=state.editingActKey.split("::");
  var pid=parts[0],orig=parts.slice(1).join("::");
  var customList=state.customActs[pid]||[];
  var customIdx=customList.indexOf(orig);
  if(customIdx!==-1){
    customList[customIdx]=val;state.customActs[pid]=customList;saveCustomActs(state.customActs);
  } else {
    if(!state.actEdits[pid]){state.actEdits[pid]={renames:{},deletions:{}};}
    state.actEdits[pid].renames[orig]=val;saveActEdits(state.actEdits);
  }
  state.editingActKey=null;render();
}
function deleteAct(pid,orig,isCustom,customIdx){
  if(isCustom){
    if(!state.customActs[pid]){return;}
    state.customActs[pid].splice(customIdx,1);saveCustomActs(state.customActs);
  } else {
    if(!state.actEdits[pid]){state.actEdits[pid]={renames:{},deletions:{}};}
    state.actEdits[pid].deletions[orig]=true;saveActEdits(state.actEdits);
  }
  render();
}
function moveAct(pid,from,to){
  var acts=getActivities(pid);
  if(to<0||to>=acts.length){return;}
  var order=acts.map(function(a){return a.orig;});
  var moved=order.splice(from,1)[0];
  order.splice(to,0,moved);
  state.actOrder[pid]=order;saveActOrder(state.actOrder);render();
}
function bindEsc(){
  document.onkeydown=function(e){
    if(e.key==="Escape"){
      if(state.editingActKey){state.editingActKey=null;render();}
      else if(state.editingIdx!==null){cancelEdit();}
      else if(state.showSheet){closeSheet();}
      else if(state.confirmClear){state.confirmClear=false;render();}
    }
  };
}

render();
</script>
</body>
</html>
