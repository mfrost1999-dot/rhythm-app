  {label:"Blue Zones",color:"#6B8C5A",fg:"#384E28",text:"The Blue Zones are five regions where people consistently live past 100: Okinawa in Japan, Sardinia in Italy, Nicoya in Costa Rica, Ikaria in Greece, and Loma Linda in California. Researcher Dan Buettner identified nine common principles among them. They move naturally throughout the day, eat mostly plants, stop before they are full, and share meals with others. They belong to faith communities and tight social circles. None of them are trying to live longer. They have simply built environments and habits that make long life the natural outcome."},

var TODAY=new Date();TODAY.setHours(0,0,0,0);

function getDateKey(d){return d.toISOString().slice(0,10);}
function offsetDate(base,days){var d=new Date(base);d.setDate(d.getDate()+days);return d;}
function getWeekDates(anchor){
  var dow=anchor.getDay(),sun=new Date(anchor);
  sun.setDate(anchor.getDate()-dow);
  return Array.from({length:7},function(_,i){var d=new Date(sun);d.setDate(sun.getDate()+i);return d;});
}
function fmtDate(d){return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});}
function fmtShort(d){return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function localDayIndex(){var d=new Date();return d.getFullYear()*10000+d.getMonth()*100+d.getDate();}
function loadData(){try{return JSON.parse(localStorage.getItem("ftc-v3")||"{}");}catch(e){return {};}}
function saveData(d){try{localStorage.setItem("ftc-v3",JSON.stringify(d));}catch(e){}}

function getCupStats(splashes){
  var uniquePillars=[],seen={};
  for(var i=0;i<splashes.length;i++){if(!seen[splashes[i].pillarId]){seen[splashes[i].pillarId]=true;uniquePillars.push(splashes[i].pillarId);}}
  var total=splashes.length,byPillar={};
  for(var j=0;j<splashes.length;j++){var pid=splashes[j].pillarId;byPillar[pid]=(byPillar[pid]||0)+1;}
  var breakdown=Object.keys(byPillar).map(function(id){return{id:id,count:byPillar[id],pct:total>0?Math.round(byPillar[id]/total*100):0,pillar:PILLARS.filter(function(p){return p.id===id;})[0]};});
  breakdown.sort(function(a,b){return b.count-a.count;});
  return{uniquePillars:uniquePillars,uniqueCount:uniquePillars.length,fillLevel:Math.min(1,uniquePillars.length/10),breakdown:breakdown,total:total};
}

function buildNudge(data,todayKey){
  var todaySplashes=(data[todayKey]&&data[todayKey].splashes)||[];
  var todayPillarIds={};
  for(var i=0;i<todaySplashes.length;i++)todayPillarIds[todaySplashes[i].pillarId]=true;
  var past3=[1,2,3].map(function(i){return getDateKey(offsetDate(new Date(todayKey+"T12:00:00"),-i));});
  var neglected=PILLARS.filter(function(p){
    if(todayPillarIds[p.id])return false;
    return past3.every(function(k){var sp=(data[k]&&data[k].splashes)||[];return!sp.some(function(s){return s.pillarId===p.id;});});
  });
  if(!neglected.length)return null;
  var idx=localDayIndex(),pick=neglected[idx%neglected.length],pool=NUDGES[pick.id];
  return pool?{pillar:pick.label,text:pool[idx%pool.length]}:null;
}

function buildEncouragement(data){
  var past7=Array.from({length:7},function(_,i){return getDateKey(offsetDate(TODAY,-i-1));});
  var scored=PILLARS.map(function(p){return{id:p.id,label:p.label,count:past7.filter(function(k){var sp=(data[k]&&data[k].splashes)||[];return sp.some(function(s){return s.pillarId===p.id;});}).length};});
  var best=scored.reduce(function(a,b){return b.count>a.count?b:a;},scored[0]);
  if(best.count<3)return null;
  var pool=ENCOURAGEMENT[best.id];
  return pool?{pillar:best.label,count:best.count,text:pool[localDayIndex()%pool.length]}:null;
}

function warmthFg(p){if(!p)return"#747060";if(p<0.3)return"#3D3D30";if(p<0.55)return"#8A6010";if(p<0.8)return"#6A4808";return"#3A2800";}

function renderCup(stats){
  var uc=stats.uniqueCount,bd=stats.breakdown,tot=stats.total,up=stats.uniquePillars;
  var at80=uc>=8,full=uc>=10;
  var W=130,H=210,rimY=14,rimRx=50,baseY=H-20,baseRx=40,bodyH=baseY-rimY;
  var lR=W/2-rimRx,rR=W/2+rimRx,lB=W/2-baseRx,rB=W/2+baseRx;
  function xL(y){return lR+(lB-lR)*(y-rimY)/bodyH;}
  function xR(y){return rR+(rB-rR)*(y-rimY)/bodyH;}
  var fillH=bodyH*Math.min(1,uc/10);
  var segs="";
  if(tot>0&&uc>0){
    var curY=baseY;
    for(var i=0;i<up.length;i++){
      var pid=up[i],b=null;
      for(var j=0;j<bd.length;j++){if(bd[j].id===pid){b=bd[j];break;}}
      if(!b)continue;
      var sh=(b.count/tot)*fillH,yB=curY,yT=curY-sh;
      var col=(b.pillar&&b.pillar.color)||"#CEC8BC";
      var pts=xL(yT).toFixed(1)+","+yT.toFixed(1)+" "+xR(yT).toFixed(1)+","+yT.toFixed(1)+" "+xR(yB).toFixed(1)+","+yB.toFixed(1)+" "+xL(yB).toFixed(1)+","+yB.toFixed(1);
      segs+="<polygon points='"+pts+"' fill='"+col+"' opacity='0.82'/>";
      curY=yT;
    }
  }
  var men="";
  if(uc>0){
    var fTop=baseY-fillH;
    if(fTop>rimY){
      var lp=null;for(var pi=0;pi<PILLARS.length;pi++){if(PILLARS[pi].id===up[up.length-1]){lp=PILLARS[pi];break;}}
      var rx=(xR(fTop)-xL(fTop))/2-1;
      men="<ellipse cx='"+W/2+"' cy='"+fTop.toFixed(1)+"' rx='"+rx.toFixed(1)+"' ry='2.5' fill='"+(lp?lp.color:"#567E90")+"' opacity='0.25'/>";
    }
  }
  var l80Y=rimY+bodyH*0.2,ll=xL(l80Y)+2,lr=xR(l80Y)-2;
  var l80=!full?"<line x1='"+ll.toFixed(1)+"' y1='"+l80Y.toFixed(1)+"' x2='"+lr.toFixed(1)+"' y2='"+l80Y.toFixed(1)+"' stroke='"+(at80?C.sageDark:C.parchDark)+"' stroke-width='0.9' stroke-dasharray='3,3' opacity='"+(at80?0.6:0.4)+"'/><text x='"+(ll-3).toFixed(1)+"' y='"+(l80Y+4).toFixed(1)+"' text-anchor='end' font-family='Inter,sans-serif' font-size='8' fill='"+C.inkLight+"' opacity='0.5'>80%</text>":"";
  var sk=full?C.sageDark:C.parchDark,sw=full?1.6:1.1;
  var uid="c"+(Math.random()*1e8|0);
  var poly="<polygon points='"+lR+","+rimY+" "+rR+","+rimY+" "+rB+","+baseY+" "+lB+","+baseY+"'";
  var svg="<svg width='"+W+"' height='"+(H+10)+"' viewBox='0 0 "+W+" "+(H+10)+"' style='overflow:visible'>"
    +"<defs><clipPath id='"+uid+"'>"+poly+" fill='none'/></clipPath></defs>"
    +poly+" fill='"+C.parchment+"'/>"
    +"<g clip-path='url(#"+uid+")'>"+segs+men+"</g>"
    +l80
    +"<line x1='"+lR+"' y1='"+rimY+"' x2='"+lB+"' y2='"+baseY+"' stroke='"+sk+"' stroke-width='"+sw+"'/>"
    +"<line x1='"+rR+"' y1='"+rimY+"' x2='"+rB+"' y2='"+baseY+"' stroke='"+sk+"' stroke-width='"+sw+"'/>"
    +"<ellipse cx='"+W/2+"' cy='"+rimY+"' rx='"+rimRx+"' ry='5.5' fill='"+C.cream+"' stroke='"+sk+"' stroke-width='"+sw+"'/>"
    +"<ellipse cx='"+W/2+"' cy='"+baseY+"' rx='"+baseRx+"' ry='4' fill='"+C.cream+"' stroke='"+sk+"' stroke-width='"+sw+"'/>"
    +"<ellipse cx='"+W/2+"' cy='"+(baseY+5)+"' rx='"+(baseRx-6)+"' ry='1.8' fill='"+C.parchDark+"' opacity='0.1'/>"
    +"</svg>";
  var stxt=full?"Cup full - a wonderful day":at80?"80% - that is enough":uc===0?"Add your first splash":uc+" of 10 pillars";
  var scol=(full||at80)?C.sageDark:C.inkLight;
  return "<div style='display:flex;flex-direction:column;align-items:center;gap:10px'>"+svg
    +"<div style='text-align:center'>"
    +"<span style='font-family:Georgia,serif;font-size:26px;color:"+(full?C.sageDark:C.ink)+"'>"+uc+"</span>"
    +"<span style='font-family:Inter,sans-serif;font-size:14px;color:"+C.inkLight+"'> / 10 pillars</span>"
    +"<div style='font-family:Inter,sans-serif;font-size:11px;color:"+scol+";margin-top:3px;letter-spacing:0.05em;text-transform:uppercase'>"+stxt+"</div>"
    +"</div></div>";
}

function renderMiniCup(stats,size){
  size=size||30;
  var uc=stats.uniqueCount,bd=stats.breakdown,tot=stats.total,up=stats.uniquePillars;
  var W=size,H=size*1.45,rimY=H*0.09,rimRx=W*0.42,baseY=H-H*0.09,baseRx=W*0.34,bodyH=baseY-rimY;
  var lR=W/2-rimRx,rR=W/2+rimRx,lB=W/2-baseRx,rB=W/2+baseRx;
  function xLm(y){return lR+(lB-lR)*(y-rimY)/bodyH;}
  function xRm(y){return rR+(rB-rR)*(y-rimY)/bodyH;}
  var fillH=bodyH*Math.min(1,uc/10),segs="";
  if(tot>0&&uc>0){
    var cy=baseY;
    for(var i=0;i<up.length;i++){
      var b=null;for(var j=0;j<bd.length;j++){if(bd[j].id===up[i]){b=bd[j];break;}}
      if(!b)continue;
      var sh=(b.count/tot)*fillH,yB=cy,yT=cy-sh;
      var col=(b.pillar&&b.pillar.color)||"#CEC8BC";
      var pts=xLm(yT).toFixed(1)+","+yT.toFixed(1)+" "+xRm(yT).toFixed(1)+","+yT.toFixed(1)+" "+xRm(yB).toFixed(1)+","+yB.toFixed(1)+" "+xLm(yB).toFixed(1)+","+yB.toFixed(1);
      segs+="<polygon points='"+pts+"' fill='"+col+"' opacity='0.8'/>";
      cy=yT;
    }
  }
  var sk=uc>=8?C.sageDark:C.parchDark;
  var uid="m"+(Math.random()*1e9|0);
  var poly="<polygon points='"+lR+","+rimY+" "+rR+","+rimY+" "+rB+","+baseY+" "+lB+","+baseY+"'";
  return "<svg width='"+W+"' height='"+H+"' viewBox='0 0 "+W+" "+H+"'>"
    +"<defs><clipPath id='"+uid+"'>"+poly+" fill='none'/></clipPath></defs>"
    +poly+" fill='"+C.parchment+"'/>"
    +"<g clip-path='url(#"+uid+")'>"+segs+"</g>"
    +"<line x1='"+lR+"' y1='"+rimY+"' x2='"+lB+"' y2='"+baseY+"' stroke='"+sk+"' stroke-width='0.8'/>"
    +"<line x1='"+rR+"' y1='"+rimY+"' x2='"+rB+"' y2='"+baseY+"' stroke='"+sk+"' stroke-width='0.8'/>"
    +"<ellipse cx='"+W/2+"' cy='"+rimY+"' rx='"+rimRx+"' ry='"+(H*0.045)+"' fill='"+C.cream+"' stroke='"+sk+"' stroke-width='0.8'/>"
    +"<ellipse cx='"+W/2+"' cy='"+baseY+"' rx='"+baseRx+"' ry='"+(H*0.035)+"' fill='"+C.cream+"' stroke='"+sk+"' stroke-width='0.8'/>"
    +"</svg>";
}

var state={view:"today",data:loadData(),dayOffset:0,weekOffset:0,monthOffset:0,showSheet:false,sheetStep:"pillar",sheetPillar:null,selectedActivities:{},waterCount:1,confirmClear:false,toast:null,toastTimer:null,openWhyPillars:{}};

function getViewDate(){return offsetDate(TODAY,state.dayOffset);}
function getViewKey(){return getDateKey(getViewDate());}
function getSplashes(){return(state.data[getViewKey()]&&state.data[getViewKey()].splashes)||[];}

function h(tag,attrs,inner){
  var s="<"+tag;
  if(attrs)s+=" "+attrs;
  s+=">"+(inner||"")+"</"+tag+">";
  return s;
}

function render(){document.getElementById("root").innerHTML=buildApp();bindEsc();}

function buildApp(){
  return "<div style='background:"+C.cream+";min-height:100vh'>"
    +(state.confirmClear?buildConfirm():"")
    +(state.toast?buildToast():"")
    +(state.showSheet?buildSheet():"")
    +"<div style='max-width:460px;margin:0 auto;padding:36px 20px 100px'>"
    +buildHeader()+buildNav()
    +(state.view==="today"?buildToday():"")
    +(state.view==="week"?buildWeek():"")
    +(state.view==="month"?buildMonth():"")
    +(state.view==="why"?buildWhy():"")
    +"</div>"
    +(state.view==="today"?"<div class='fab'><button onclick='openSheet()' style='padding:14px 36px;border-radius:30px;border:none;background:#7A8C5A;color:#F8F6F1;font-family:Georgia,serif;font-size:18px;box-shadow:0 4px 20px rgba(106,138,80,0.35)'>+ Splash</button></div>":"")
    +"</div>";
}

function buildHeader(){
  var now=new Date(),idx=now.getFullYear()*10000+now.getMonth()*100+now.getDate(),q=QUOTES[idx%QUOTES.length];
  return "<div style='margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid "+C.parchDark+"'>"
    +"<div style='display:flex;justify-content:space-between;align-items:baseline'>"
    +"<h1 style='font-family:Georgia,serif;font-size:34px;font-weight:400;letter-spacing:-0.5px'>Fill the Cup</h1>"
    +"<p style='font-family:Inter,sans-serif;font-size:12px;color:"+C.inkMid+";letter-spacing:0.06em;text-transform:uppercase'>"+now.toLocaleDateString("en-US",{weekday:"short",month:"long",day:"numeric"})+"</p>"
    +"</div>"
    +"<div style='margin-top:14px;padding-top:14px;border-top:1px dashed "+C.parchDark+"'>"
    +"<p style='font-family:Georgia,serif;font-style:italic;font-size:15px;color:"+C.inkMid+";line-height:1.7;margin-bottom:5px'>\""+q.text+"\"</p>"
    +"<p style='font-family:Inter,sans-serif;font-size:11px;color:"+C.inkLight+";letter-spacing:0.05em;text-transform:uppercase'>"+q.source+"</p>"
    +"</div></div>";
}

function buildNav(){
  var tabs=[["today","Today"],["week","This week"],["month","Month"],["why","Why"]];
  var btns=tabs.map(function(t){return "<button class='tab-btn"+(state.view===t[0]?" active":"")+"' onclick='setView(\""+t[0]+"\")'>"+t[1]+"</button>";}).join("");
  return "<div style='display:flex;gap:20px;margin-bottom:24px;border-bottom:1px solid "+C.parchDark+";padding-bottom:14px'>"+btns+"</div>";
}

function buildToday(){
  var vd=getViewDate(),isToday=state.dayOffset===0;
  var splashes=getSplashes(),stats=getCupStats(splashes);
  var uc=stats.uniqueCount,fl=stats.fillLevel,bd=stats.breakdown;
  var at80=uc>=8;
  var nudge=isToday?buildNudge(state.data,getViewKey()):null;
  var enc=isToday&&!nudge?buildEncouragement(state.data):null;

  var nav="<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:16px'>"
    +"<button class='nav-btn' onclick='addDayOffset(-1)'>Earlier</button>"
    +"<div style='text-align:center'>"
    +"<div style='font-family:Georgia,serif;font-size:17px;color:"+C.ink+"'>"+(isToday?"Today":fmtDate(vd))+"</div>"
    +(!isToday?"<button onclick='addDayOffset("+(-state.dayOffset)+")' style='background:none;border:none;font-family:Inter,sans-serif;font-size:13px;color:"+C.inkMid+";text-decoration:underline;padding:2px 0 0'>Back to today</button>":"")
    +"</div>"
    +"<button class='nav-btn' onclick='addDayOffset(1)'"+(state.dayOffset>=0?" disabled":"")+">Later</button>"
    +"</div>";

  var past=!isToday?"<div style='margin-bottom:16px;padding:12px 16px;border-radius:4px;background:"+(uc>0?warmthBg(fl):C.parchment)+";border:1px solid "+C.parchDark+"'>"
    +"<p style='font-family:Georgia,serif;font-style:italic;font-size:15px;color:"+(uc>0?warmthFg(fl):C.inkLight)+";margin:0'>"
    +(uc>0?uc+" pillars - "+Math.round(fl*100)+"%"+(at80?" - a good day.":"."):(fmtDate(vd)+" - nothing logged yet."))
    +"</p></div>":"";

  var banner=isToday&&at80?"<div style='margin-bottom:16px;padding:12px 16px;border-radius:4px;background:#EAF0E4;border-left:3px solid "+C.sageDark+"'>"
    +"<p style='font-family:Georgia,serif;font-style:italic;font-size:15px;color:"+C.sageDark+";line-height:1.7;margin:0'>"
    +(uc>=10?"A truly full cup. Every pillar tended to.":"You reached your 80 today. That is enough.")
    +"</p></div>":"";

  var nc=nudge||enc;
  var nudgeCard=isToday&&nc?"<div style='margin-bottom:14px;padding:12px 16px;border-radius:4px;background:"+(nudge?C.goldPale:"#EAF0E4")+";border-left:3px solid "+(nudge?C.gold:C.sage)+"'>"
    +"<p style='font-family:Georgia,serif;font-style:italic;font-size:13px;color:"+C.inkMid+";line-height:1.7;margin:0'>"+nc.text+"</p>"
    +"<p style='font-family:Inter,sans-serif;font-size:11px;color:"+(nudge?C.gold:C.sageDark)+";margin:8px 0 0;letter-spacing:0.05em;text-transform:uppercase'>"+(nudge?nudge.pillar+" - has not shown up in a few days":enc.pillar+" - "+enc.count+" of the last 7 days")+"</p>"
    +"</div>":"";

  var greet=isToday&&!at80?"<p style='font-family:Georgia,serif;font-size:18px;color:"+C.inkMid+";margin-bottom:16px;font-style:italic'>"
    +(uc===0?"How is today unfolding?":uc<4?"Every splash counts. Keep going.":"More than halfway there. You are doing well.")
    +"</p>":"";

  var bkdn=bd.length>0?"<div style='margin-top:4px;margin-bottom:4px'>"
    +"<div style='font-family:Inter,sans-serif;font-size:11px;color:"+C.inkLight+";letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px'>Pillar breakdown</div>"
    +bd.map(function(b){return "<div style='display:flex;align-items:center;gap:8px;margin-bottom:6px'>"
      +"<div style='width:9px;height:9px;border-radius:50%;background:"+b.pillar.color+";flex-shrink:0'></div>"
      +"<div style='font-family:Inter,sans-serif;font-size:13px;color:"+C.ink+";width:112px;flex-shrink:0'>"+b.pillar.label+"</div>"
      +"<div style='flex:1;height:4px;border-radius:2px;background:"+C.parchDark+";overflow:hidden'><div style='height:100%;border-radius:2px;width:"+b.pct+"%;background:"+b.pillar.color+"'></div></div>"
      +"<div style='font-family:Inter,sans-serif;font-size:12px;color:"+C.inkLight+";width:34px;text-align:right;flex-shrink:0'>"+b.pct+"%</div>"
      +"</div>";}).join("")
    +"</div>":"";

  var sl=splashes.length>0?"<div style='margin-top:18px'>"
    +"<div style='font-family:Inter,sans-serif;font-size:11px;color:"+C.inkLight+";letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px'>"+(isToday?"Today":"This day")+"'s splashes</div>"
    +splashes.map(function(s,i){
      var p=null;for(var k=0;k<PILLARS.length;k++){if(PILLARS[k].id===s.pillarId){p=PILLARS[k];break;}}
      return "<div class='splash-item' style='background:"+(p?p.pale:C.parchment)+";border:1px solid "+(p?p.color:C.parchDark)+"28'>"
        +"<div style='width:8px;height:8px;border-radius:50%;background:"+(p?p.color:C.parchDark)+";flex-shrink:0'></div>"
        +"<span style='font-family:Inter,sans-serif;font-size:14px;color:"+(p?p.dark:C.inkMid)+";flex:1'>"+s.label+"</span>"
        +"<span style='font-family:Inter,sans-serif;font-size:11px;color:"+C.inkLight+";flex-shrink:0'>"+(p?p.label:"")+"</span>"
        +"<button class='remove-btn' onclick='removeSplash("+i+")'>x</button>"
        +"</div>";}).join("")
    +"</div>":"";

  var clr=splashes.length>0?"<div style='display:flex;justify-content:center;margin-top:12px'><button onclick='state.confirmClear=true;render()' style='background:none;border:none;font-family:Inter,sans-serif;font-size:12px;color:"+C.inkLight+";text-decoration:underline'>Clear this day</button></div>":"";

  return nav+past+banner+nudgeCard+greet
    +"<div style='display:flex;flex-direction:column;align-items:center;padding:24px 0 16px'>"+renderCup(stats)+"</div>"
    +bkdn+sl+clr;
}

function buildWeek(){
  var DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var anchor=offsetDate(TODAY,state.weekOffset*7),weekDates=getWeekDates(anchor);
  var label=state.weekOffset===0?"This week":state.weekOffset===-1?"Last week":fmtShort(weekDates[0])+" - "+fmtShort(weekDates[6]);

  var cups=weekDates.map(function(dt,i){
    var key=getDateKey(dt),sp=(state.data[key]&&state.data[key].splashes)||[],stats=getCupStats(sp);
    var isTodayCell=key===getDateKey(TODAY),isFuture=dt>TODAY;
    return "<div style='text-align:center;opacity:"+(isFuture?0.35:1)+"'>"
      +"<div style='font-family:Inter,sans-serif;font-size:10px;color:"+C.inkLight+";margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em'>"+DAYS[i]+"</div>"
      +"<div "+(isFuture?"":"data-key='"+key+"' onclick='jumpToDay(this.dataset.key)'")
      +" style='cursor:"+(isFuture?"default":"pointer")+";display:flex;flex-direction:column;align-items:center;padding:5px 0 3px;border-radius:4px;border:"+(isTodayCell?"2":"1")+"px solid "+(isTodayCell?C.sage:C.parchDark)+";background:"+(isTodayCell?"#EAF0E4":C.cream)+"'>"
      +renderMiniCup(stats,30)
      +"<div style='font-family:Inter,sans-serif;font-size:11px;color:"+(stats.uniqueCount>=8?C.sageDark:C.inkLight)+";margin-top:2px'>"+(stats.uniqueCount||"-")+"</div>"
      +"</div></div>";}).join("");

  var wByP={},wTot=0;
  weekDates.forEach(function(dt){var sp=(state.data[getDateKey(dt)]&&state.data[getDateKey(dt)].splashes)||[];sp.forEach(function(s){wByP[s.pillarId]=(wByP[s.pillarId]||0)+1;wTot++;});});

  var wRows=PILLARS.map(function(p){return{p:p,cnt:wByP[p.id]||0};}).filter(function(x){return x.cnt>0;}).sort(function(a,b){return b.cnt-a.cnt;}).map(function(x){
    var pct=wTot>0?Math.round(x.cnt/wTot*100):0;
    return "<div style='display:flex;align-items:center;gap:8px;margin-bottom:7px'>"
      +"<div style='width:8px;height:8px;border-radius:50%;background:"+x.p.color+";flex-shrink:0'></div>"
      +"<div style='width:112px;font-family:Inter,sans-serif;font-size:13px;color:"+C.ink+";flex-shrink:0'>"+x.p.label+"</div>"
      +"<div style='flex:1;height:4px;border-radius:2px;background:"+C.parchDark+";overflow:hidden'><div style='height:100%;border-radius:2px;width:"+pct+"%;background:"+x.p.color+"'></div></div>"
      +"<div style='font-family:Inter,sans-serif;font-size:12px;color:"+C.inkLight+";width:34px;text-align:right;flex-shrink:0'>"+pct+"%</div>"
      +"</div>";}).join("");

  var s=SEASONAL[new Date().getMonth()],mn=MONTHS[new Date().getMonth()];
  return "<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:20px'>"
    +"<button class='nav-btn' onclick='addWeekOffset(-1)'>Earlier</button>"
    +"<div style='font-family:Georgia,serif;font-size:15px;color:"+C.ink+"'>"+label+"</div>"
    +"<button class='nav-btn' onclick='addWeekOffset(1)'"+(state.weekOffset>=0?" disabled":"")+">Later</button>"
    +"</div>"
    +"<p style='font-family:Georgia,serif;font-size:15px;color:"+C.inkLight+";font-style:italic;margin-bottom:16px'>Weekly cups</p>"
    +"<div style='display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:24px'>"+cups+"</div>"
    +"<div style='border-top:1px solid "+C.parchDark+";padding-top:18px;margin-bottom:24px'>"
    +"<p style='font-family:Georgia,serif;font-size:14px;color:"+C.inkLight+";font-style:italic;margin-bottom:14px'>By pillar this week</p>"
    +(wTot===0?"<p style='font-family:Inter,sans-serif;font-size:14px;color:"+C.inkLight+"'>No splashes logged this week yet.</p>":wRows)
    +"</div>"
    +"<div style='padding:20px 22px;border-radius:6px;background:"+C.parchment+";border-left:3px solid #B0CCAD'>"
    +"<p style='font-family:Georgia,serif;font-style:italic;font-size:15px;color:"+C.inkMid+";line-height:1.8;margin:0'>"+s.text+"</p>"
    +"<p style='font-family:Inter,sans-serif;font-size:11px;color:"+C.inkLight+";margin-top:12px;letter-spacing:0.05em;text-transform:uppercase'>"+s.season+" - "+mn+"</p>"
    +"</div>";
}

function buildMonth(){
  var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var DAYS_S=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var monthRef=new Date(TODAY.getFullYear(),TODAY.getMonth()+state.monthOffset,1);
  var y=monthRef.getFullYear(),m=monthRef.getMonth(),last=new Date(y,m+1,0),dow=new Date(y,m,1).getDay();
  var s=SEASONAL[new Date().getMonth()],mn=MONTHS[new Date().getMonth()];

  var cells="<div></div>".repeat(dow);
  for(var d=1;d<=last.getDate();d++){
    var dt=new Date(y,m,d),key=getDateKey(dt),stats=getCupStats((state.data[key]&&state.data[key].splashes)||[]);
    var n=stats.uniqueCount,pct=n/10,isTodayCell=key===getDateKey(TODAY),isFuture=dt>TODAY;
    cells+="<div "+(isFuture?"":"data-key='"+key+"' onclick='jumpToDay(this.dataset.key)'")
      +" style='aspect-ratio:1;border-radius:4px;background:"+(isFuture?C.cream:n>0?warmthBg(pct):C.parchment)+";border:"+(isTodayCell?"2":"1")+"px solid "+(isTodayCell?C.sage:C.parchDark)+";display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:"+(isFuture?"default":"pointer")+";opacity:"+(isFuture?0.35:1)+"'>"
      +"<span style='font-family:Inter,sans-serif;font-size:12px;color:"+(isFuture?C.inkLight:n>0?warmthFg(pct):C.inkLight)+";font-weight:"+(isTodayCell?700:400)+"'>"+d+"</span>"
      +(n>0&&!isFuture?"<span style='font-family:Inter,sans-serif;font-size:9px;color:"+warmthFg(pct)+";opacity:0.85;margin-top:1px'>"+n+"</span>":"")
      +"</div>";
  }

  var scores=[],at80c=0;
  for(var dd=1;dd<=last.getDate();dd++){var dt2=new Date(y,m,dd);if(dt2>TODAY)continue;var st=getCupStats((state.data[getDateKey(dt2)]&&state.data[getDateKey(dt2)].splashes)||[]);if(st.uniqueCount>0){scores.push(st.uniqueCount/10);if(st.uniqueCount>=8)at80c++;}}
  var cnt=scores.length,avg=cnt?Math.round(scores.reduce(function(a,b){return a+b;},0)/cnt*100):0,best=cnt?Math.round(Math.max.apply(null,scores)*100):0;

  var mByP={},mTot=0;
  for(var ddd=1;ddd<=last.getDate();ddd++){var dt3=new Date(y,m,ddd);if(dt3>TODAY)continue;var sp2=(state.data[getDateKey(dt3)]&&state.data[getDateKey(dt3)].splashes)||[];sp2.forEach(function(s2){mByP[s2.pillarId]=(mByP[s2.pillarId]||0)+1;mTot++;});}
  var top3=Object.keys(mByP).map(function(id){return{id:id,cnt:mByP[id]};}).sort(function(a,b){return b.cnt-a.cnt;}).slice(0,3).map(function(x){var p=null;for(var i=0;i<PILLARS.length;i++){if(PILLARS[i].id===x.id){p=PILLARS[i];break;}}return{p:p,cnt:x.cnt,pct:mTot>0?Math.round(x.cnt/mTot*100):0};});
  var top3Html=top3.length>0?"<div style='border-top:1px solid "+C.parchDark+";padding-top:18px;margin-bottom:24px'>"
    +"<p style='font-family:Georgia,serif;font-size:15px;color:"+C.inkLight+";font-style:italic;margin-bottom:14px'>Most active pillars this month</p>"
    +top3.map(function(x,i){return "<div style='display:flex;align-items:center;gap:10px;margin-bottom:10px'>"
      +"<div style='width:22px;height:22px;border-radius:50%;background:"+x.p.color+";display:flex;align-items:center;justify-content:center;flex-shrink:0'><span style='font-family:Inter,sans-serif;font-size:11px;font-weight:700;color:#fff'>"+(i+1)+"</span></div>"
      +"<div style='flex:1'><div style='font-family:Inter,sans-serif;font-size:14px;color:"+C.ink+"'>"+x.p.label+"</div><div style='font-family:Inter,sans-serif;font-size:12px;color:"+C.inkLight+"'>"+x.cnt+" splash"+(x.cnt!==1?"es":"")+" - "+x.pct+"% of the month</div></div>"
      +"</div>";}).join("")
    +"</div>":"";

  return "<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:20px'>"
    +"<button class='nav-btn' onclick='addMonthOffset(-1)'>Earlier</button>"
    +"<div style='font-family:Georgia,serif;font-size:15px;color:"+C.ink+"'>"+MONTHS[m]+" "+y+"</div>"
    +"<button class='nav-btn' onclick='addMonthOffset(1)'"+(state.monthOffset>=0?" disabled":"")+">Later</button>"
    +"</div>"
    +"<div style='display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px'>"+DAYS_S.map(function(d){return "<div style='font-family:Inter,sans-serif;font-size:11px;color:"+C.inkLight+";text-align:center;text-transform:uppercase;letter-spacing:0.05em'>"+d+"</div>";}).join("")+"</div>"
    +"<div style='display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:18px'>"+cells+"</div>"
    +"<div style='display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px'>"+[["#DDD9D0","Just starting"],["#EEE0AA","Building"],["#DFC06A","Almost there"],["#C8A030","80% reached"]].map(function(x){return "<div style='display:flex;align-items:center;gap:5px;font-family:Inter,sans-serif;font-size:12px;color:"+C.inkLight+"'><div style='width:11px;height:11px;border-radius:2px;background:"+x[0]+";border:1px solid "+C.parchDark+"'></div>"+x[1]+"</div>";}).join("")+"</div>"
    +"<div style='border-top:1px solid "+C.parchDark+";padding-top:18px;margin-bottom:24px'>"
    +"<p style='font-family:Georgia,serif;font-size:15px;color:"+C.inkLight+";font-style:italic;margin-bottom:14px'>This month at a glance</p>"
    +"<div style='display:grid;grid-template-columns:1fr 1fr;gap:10px'>"+[["Days logged",cnt],["Days at 80%+",at80c],["Avg fill",cnt?avg+"%":"--"],["Best day",cnt?best+"%":"--"]].map(function(x){return "<div style='padding:14px 16px;border-radius:4px;background:"+C.parchment+";border:1px solid "+C.parchDark+"'><div style='font-family:Georgia,serif;font-size:24px;color:"+C.ink+";margin-bottom:4px'>"+x[1]+"</div><div style='font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+"'>"+x[0]+"</div></div>";}).join("")+"</div>"
    +"</div>"
    +top3Html
    +"<div style='padding:20px 22px;border-radius:6px;background:"+C.parchment+";border-left:3px solid #B0CCAD'>"
    +"<p style='font-family:Georgia,serif;font-style:italic;font-size:15px;color:"+C.inkMid+";line-height:1.8;margin:0'>"+s.text+"</p>"
    +"<p style='font-family:Inter,sans-serif;font-size:11px;color:"+C.inkLight+";margin-top:12px;letter-spacing:0.05em;text-transform:uppercase'>"+s.season+" - "+mn+"</p>"
    +"</div>";
}

function buildWhy(){
  return "<div style='display:flex;flex-direction:column'>"
    +"<div style='margin-bottom:28px'><h2 style='font-family:Georgia,serif;font-size:24px;font-weight:400;color:"+C.ink+";margin-bottom:12px'>The idea behind Fill the Cup</h2>"
    +"<p style='font-family:Inter,sans-serif;font-size:15px;color:"+C.inkMid+";line-height:1.8'>Fill the Cup is not a diet app. It does not count calories, track macros, or reward streaks. It is a daily practice, a quiet invitation to add small, deliberate acts of goodness to your day. Each splash represents one thing done well. The goal is not perfection. It is fullness, one pillar at a time.</p></div>"
    +"<div class='divider'></div>"
    +"<div style='margin-bottom:28px'><h2 style='font-family:Georgia,serif;font-size:24px;font-weight:400;color:"+C.ink+";margin-bottom:20px'>Four inspirations</h2>"
    +WHY_INSPIRATIONS.map(function(x){return "<div style='margin-bottom:16px;padding:18px 20px;border-radius:6px;background:"+C.parchment+";border-left:3px solid "+x.color+"'><h3 style='font-family:Georgia,serif;font-size:17px;font-weight:400;color:"+x.fg+";margin-bottom:10px'>"+x.label+"</h3><p style='font-family:Inter,sans-serif;font-size:14px;color:"+C.inkMid+";line-height:1.8;margin:0'>"+x.text+"</p></div>";}).join("")+"</div>"
    +"<div class='divider'></div>"
    +"<div style='margin-bottom:28px'><h2 style='font-family:Georgia,serif;font-size:24px;font-weight:400;color:"+C.ink+";margin-bottom:12px'>The 80% principle</h2>"
    +"<p style='font-family:Inter,sans-serif;font-size:15px;color:"+C.inkMid+";line-height:1.8'>In Okinawa, people say a phrase before every meal: hara hachi bu. Eat until you are eight parts full. Fill the Cup applies the same principle to your whole day. Eight pillars covered is a genuinely good day. Perfection is fragile. Consistency is sturdy. A cup at 80% every day for a year is a transformed life.</p></div>"
    +"<div class='divider'></div>"
    +"<div style='margin-bottom:28px'><h2 style='font-family:Georgia,serif;font-size:24px;font-weight:400;color:"+C.ink+";margin-bottom:12px'>What counts as a splash</h2>"
    +"<p style='font-family:Inter,sans-serif;font-size:15px;color:"+C.inkMid+";line-height:1.8;margin-bottom:14px'>A splash is any deliberate act of goodness that belongs to one of the ten pillars. Morning prayer is a splash. A walk outside is a splash. Calling a friend, cooking a real meal, tending the garden, turning the screens off early, each one is a splash.</p>"
    +"<p style='font-family:Inter,sans-serif;font-size:15px;color:"+C.inkMid+";line-height:1.8'>The fill level of the glass rises each time a new pillar is represented. Within that fill, each pillar segment is sized proportionally by how many splashes came from it. Water is simple: each 8 oz is one splash.</p></div>"
    +"<div class='divider'></div>"
    +"<div><h2 style='font-family:Georgia,serif;font-size:24px;font-weight:400;color:"+C.ink+";margin-bottom:4px'>Ten pillars</h2>"
    +"<p style='font-family:Inter,sans-serif;font-size:14px;color:"+C.inkLight+";font-style:italic;margin-bottom:16px'>Tap any pillar to read about it.</p>"
    +WHY_PILLARS.map(function(x){
      var open=!!state.openWhyPillars[x.label];
      return "<div style='border-bottom:1px solid "+C.parchDark+"'>"
        +"<button class='why-pillar-btn' onclick='toggleWhy(\""+x.label.replace(/"/g,"&quot;")+"\")'>"
        +"<div style='display:flex;align-items:center;gap:10px'><div style='width:10px;height:10px;border-radius:50%;background:"+x.color+";flex-shrink:0'></div><span style='font-family:Georgia,serif;font-size:17px;font-weight:400;color:"+C.ink+"'>"+x.label+"</span></div>"
        +"<span style='font-family:Georgia,serif;font-size:20px;color:"+C.inkLight+";line-height:1;flex-shrink:0'>"+(open?"-":"+")+"</span>"
        +"</button>"
        +(open?"<div class='why-pillar-content'><p style='font-family:Inter,sans-serif;font-size:14px;color:"+C.inkMid+";line-height:1.8;margin-bottom:12px'>"+x.text+"</p><div>"+x.tags.map(function(t){return "<span class='tag' style='border:1px solid "+x.color+";background:"+x.color+"18;color:"+x.color+"'>"+t+"</span>";}).join("")+"</div></div>":"")
        +"</div>";}).join("")
    +"</div></div>";
}

function buildSheet(){
  if(state.sheetStep==="pillar"){
    return "<div class='sheet-overlay' onclick='if(event.target===this)closeSheet()'>"
      +"<div class='sheet'>"
      +"<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:20px'>"
      +"<div><div style='font-family:Georgia,serif;font-size:20px;color:"+C.ink+"'>Add a splash</div>"
      +"<div style='font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+";margin-top:3px'>Which pillar does it belong to?</div></div>"
      +"<button onclick='closeSheet()' style='background:none;border:none;font-size:22px;color:"+C.inkLight+"'>x</button>"
      +"</div>"
      +"<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px'>"
      +PILLARS.map(function(p){
        return "<button class='pillar-btn' onclick='selectPillar(\""+p.id+"\")' style='border-color:"+p.color+"44;background:"+p.pale+"'>"
          +"<div style='width:10px;height:10px;border-radius:50%;background:"+p.color+";flex-shrink:0'></div>"
          +"<span style='font-family:Georgia,serif;font-size:14px;color:"+p.dark+"'>"+p.label+"</span>"
          +"</button>";}).join("")
      +"</div></div></div>";
  }

  var p=state.sheetPillar;

  if(p.id==="water"){
    var wc=state.waterCount;
    return "<div class='sheet-overlay' onclick='if(event.target===this)closeSheet()'>"
      +"<div class='sheet'>"
      +"<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:20px'>"
      +"<div><button onclick='backToStep1()' style='background:none;border:none;font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+";text-decoration:underline;margin-bottom:4px'>Back</button>"
      +"<div style='font-family:Georgia,serif;font-size:20px;color:"+p.dark+"'>Water</div>"
      +"<div style='font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+";margin-top:3px'>How many 8 oz glasses?</div></div>"
      +"<button onclick='closeSheet()' style='background:none;border:none;font-size:22px;color:"+C.inkLight+"'>x</button></div>"
      +"<div class='water-stepper'>"
      +"<button class='w-btn' onclick='adjWater(-1)'"+(wc<=1?" disabled":"")+">-</button>"
      +"<div class='w-count'>"+wc+"</div>"
      +"<button class='w-btn' onclick='adjWater(1)'>+</button>"
      +"</div>"
      +"<div style='text-align:center;font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+";margin-bottom:18px'>"+wc*8+" oz total</div>"
      +"<button onclick='confirmWater()' style='display:block;width:100%;padding:13px;border-radius:6px;border:none;background:"+p.color+";color:#fff;font-family:Georgia,serif;font-size:17px'>Add "+wc+" splash"+(wc!==1?"es":"")+"</button>"
      +"</div></div>";
  }

  var sel=state.selectedActivities[p.id]||{};
  var acts=ACTIVITIES[p.id].map(function(act){
    var isSel=!!sel[act];
    var safeAct=act.replace(/\\/g,"\\\\").replace(/"/g,"&quot;");
    return "<button class='activity-row' onclick='toggleActivity(\""+safeAct+"\")'>"
      +"<div style='display:flex;align-items:center;gap:10px'>"
      +"<div style='width:16px;height:16px;border-radius:3px;border:1.5px solid "+(isSel?p.color:C.parchDark)+";background:"+(isSel?p.color:"transparent")+";display:flex;align-items:center;justify-content:center;flex-shrink:0'>"
      +(isSel?"<svg width='10' height='10' viewBox='0 0 10 10'><path d='M1.5 5.5l2.5 2.5 5-5' stroke='#fff' stroke-width='1.6' fill='none' stroke-linecap='round'/></svg>":"")
      +"</div><span>"+act+"</span></div></button>";}).join("");

  var selCount=Object.keys(sel).length;
  return "<div class='sheet-overlay' onclick='if(event.target===this)closeSheet()'>"
    +"<div class='sheet'>"
    +"<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:20px'>"
    +"<div><button onclick='backToStep1()' style='background:none;border:none;font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+";text-decoration:underline;margin-bottom:4px'>Back</button>"
    +"<div style='font-family:Georgia,serif;font-size:20px;color:"+p.dark+"'>"+p.label+"</div>"
    +"<div style='font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+";margin-top:3px'>Tap to select. Choose as many as apply.</div></div>"
    +"<button onclick='closeSheet()' style='background:none;border:none;font-size:22px;color:"+C.inkLight+"'>x</button></div>"
    +"<div>"+acts+"</div>"
    +"<div style='margin-top:14px;padding-top:12px;border-top:1px solid "+C.parchDark+"'>"
    +"<div style='font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+";margin-bottom:7px'>Or write your own:</div>"
    +"<div style='display:flex;gap:8px'>"
    +"<input id='cai' class='custom-input' type='text' placeholder='What did you do?' onkeydown='if(event.key===\"Enter\"){event.preventDefault();addCustom();}'/>"
    +"<button onclick='addCustom()' style='padding:9px 16px;border-radius:4px;border:none;background:"+p.color+";color:#fff;font-family:Inter,sans-serif;font-size:13px'>Add</button>"
    +"</div></div>"
    +(selCount>0?"<div style='margin-top:16px;padding-top:14px;border-top:1px solid "+C.parchDark+";display:flex;align-items:center;justify-content:space-between'>"
      +"<div style='font-family:Inter,sans-serif;font-size:13px;color:"+C.inkMid+"'>"+selCount+" selected</div>"
      +"<button onclick='confirmActivities()' style='padding:10px 24px;border-radius:6px;border:none;background:"+p.color+";color:#fff;font-family:Georgia,serif;font-size:15px'>Add "+(selCount>1?selCount+" splashes":"splash")+"</button>"
      +"</div>":"")
    +"</div></div>";
}

function buildConfirm(){
  return "<div class='modal-overlay'><div class='modal'>"
    +"<p style='font-family:Georgia,serif;font-size:17px;color:"+C.ink+";margin-bottom:8px'>Clear this day?</p>"
    +"<p style='font-family:Inter,sans-serif;font-size:13px;color:"+C.inkLight+";margin-bottom:24px;line-height:1.6'>All splashes for this day will be removed.</p>"
    +"<div style='display:flex;gap:10px'>"
    +"<button onclick='state.confirmClear=false;render()' style='flex:1;padding:10px;border-radius:6px;border:1px solid "+C.parchDark+";background:transparent;font-family:Inter,sans-serif;font-size:14px;color:"+C.inkMid+"'>Cancel</button>"
    +"<button onclick='clearDay()' style='flex:1;padding:10px;border-radius:6px;border:none;background:"+C.clay+";font-family:Inter,sans-serif;font-size:14px;color:#fff'>Clear</button>"
    +"</div></div></div>";
}

function buildToast(){
  return "<div class='toast'><span>"+state.toast.message+"</span>"
    +"<button onclick='undoToast()' style='background:none;border:1px solid rgba(255,255,255,0.4);border-radius:4px;color:#F8F6F1;font-family:Inter,sans-serif;font-size:13px;padding:3px 10px'>Undo</button>"
    +"</div>";
}

function setView(v){state.view=v;render();}
function addDayOffset(n){state.dayOffset=Math.min(0,state.dayOffset+n);render();}
function addWeekOffset(n){state.weekOffset=Math.min(0,state.weekOffset+n);render();}
function addMonthOffset(n){state.monthOffset=Math.min(0,state.monthOffset+n);render();}
function jumpToDay(key){var dt=new Date(key+"T12:00:00");state.dayOffset=Math.round((dt-TODAY)/86400000);state.view="today";render();}
function toggleWhy(label){state.openWhyPillars[label]=!state.openWhyPillars[label];render();}
function openSheet(){state.showSheet=true;state.sheetStep="pillar";state.sheetPillar=null;state.selectedActivities={};state.waterCount=1;render();}
function closeSheet(){state.showSheet=false;state.selectedActivities={};render();}
function backToStep1(){state.sheetStep="pillar";state.sheetPillar=null;state.selectedActivities={};render();}
function selectPillar(id){var p=null;for(var i=0;i<PILLARS.length;i++){if(PILLARS[i].id===id){p=PILLARS[i];break;}}state.sheetPillar=p;state.sheetStep="activity";if(!state.selectedActivities[id])state.selectedActivities[id]={};render();}
function toggleActivity(act){var id=state.sheetPillar.id;if(!state.selectedActivities[id])state.selectedActivities[id]={};if(state.selectedActivities[id][act])delete state.selectedActivities[id][act];else state.selectedActivities[id][act]=true;render();}
function addCustom(){var el=document.getElementById("cai");if(!el)return;var val=el.value.trim();if(!val)return;var id=state.sheetPillar.id;if(!state.selectedActivities[id])state.selectedActivities[id]={};state.selectedActivities[id][val]=true;render();var nel=document.getElementById("cai");if(nel){nel.value="";nel.focus();}}
function confirmActivities(){var id=state.sheetPillar.id,sel=state.selectedActivities[id]||{},acts=Object.keys(sel);if(!acts.length)return;var key=getViewKey(),cur=state.data[key]||{},existing=cur.splashes||[];var newSplashes=acts.map(function(label,i){return{pillarId:id,label:label,timestamp:Date.now()+i};});state.data[key]=Object.assign({},cur,{splashes:existing.concat(newSplashes)});saveData(state.data);state.showSheet=false;state.selectedActivities={};render();}
function adjWater(n){state.waterCount=Math.max(1,Math.min(16,(state.waterCount||1)+n));render();}
function confirmWater(){var key=getViewKey(),cur=state.data[key]||{},n=state.waterCount,existing=cur.splashes||[];var newSplashes=[];for(var i=0;i<n;i++)newSplashes.push({pillarId:"water",label:"8 oz of water",timestamp:Date.now()+i});state.data[key]=Object.assign({},cur,{splashes:existing.concat(newSplashes)});saveData(state.data);state.showSheet=false;state.waterCount=1;render();}
function removeSplash(idx){var key=getViewKey(),snap=JSON.parse(JSON.stringify(state.data[key]));var label=state.data[key]&&state.data[key].splashes&&state.data[key].splashes[idx]?state.data[key].splashes[idx].label:"";state.data[key].splashes.splice(idx,1);saveData(state.data);showToast(label?"Removed: "+label:"Splash removed",function(){state.data[key]=snap;saveData(state.data);render();});render();}
function clearDay(){state.data[getViewKey()]={};saveData(state.data);state.confirmClear=false;render();}
function showToast(msg,undoFn){if(state.toastTimer)clearTimeout(state.toastTimer);state.toast={message:msg,undoFn:undoFn};state.toastTimer=setTimeout(function(){state.toast=null;render();},4000);render();}
function undoToast(){if(state.toastTimer)clearTimeout(state.toastTimer);if(state.toast&&state.toast.undoFn)state.toast.undoFn();state.toast=null;render();}
function bindEsc(){document.onkeydown=function(e){if(e.key==="Escape"){if(state.showSheet)closeSheet();else if(state.confirmClear){state.confirmClear=false;render();}}};}

render();
</script>
</body>
</html>
